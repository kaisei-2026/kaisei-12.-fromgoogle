    updateAdvPreview() {
        const c = document.getElementById('adv-preview-canvas'); if (!c) return; const ctx = c.getContext('2d'); ctx.clearRect(0, 0, c.width, c.height);
        const s = this.advShape; let b = this.getStrokeBBox(s);
        let cx = (b.minX + b.maxX) / 2; let cy = (b.minY + b.maxY) / 2; let w = b.maxX - b.minX; let h = b.maxY - b.minY;
        let scale = Math.min(200 / (w||1), 200 / (h||1)); if (scale > 2) scale = 2; this.advPreviewTransform = { cx, cy, scale };

        ctx.save(); ctx.translate(140, 140); ctx.scale(scale, scale); ctx.translate(-cx, -cy);

        if (s.type === 'image') { const img = this.imageCache[s.src]; if(img) ctx.drawImage(img, s.x, s.y, s.w, s.h); } 
        else if (s.type === 'shape') {
            ctx.strokeStyle = s.color; ctx.lineWidth = s.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.beginPath();
            if (s.shapeType === 'rect') { 
                if(s.pts) { ctx.moveTo(s.pts[0].x, s.pts[0].y); ctx.lineTo(s.pts[1].x, s.pts[1].y); ctx.lineTo(s.pts[2].x, s.pts[2].y); ctx.lineTo(s.pts[3].x, s.pts[3].y); ctx.closePath(); }
                else ctx.rect(s.x1, s.y1, s.x2-s.x1, s.y2-s.y1); 
            } 
            else if (s.shapeType === 'circle') { const rx=Math.abs(s.x2-s.x1)/2, ry=Math.abs(s.y2-s.y1)/2; ctx.ellipse((s.x1+s.x2)/2, (s.y1+s.y2)/2, rx, ry, 0, 0, Math.PI*2); } 
            else if (s.shapeType === 'triangle' && s.pts) { ctx.moveTo(s.pts[0].x, s.pts[0].y); ctx.lineTo(s.pts[1].x, s.pts[1].y); ctx.lineTo(s.pts[2].x, s.pts[2].y); ctx.closePath(); } 
            else if (s.shapeType === 'line') { ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); }
            ctx.stroke();
        }
        ctx.restore();
        
        if ((s.shapeType === 'triangle' || s.shapeType === 'rect') && s.pts) {
            s.pts.forEach((p, i) => {
                const px = 140 + (p.x - cx) * scale; const py = 140 + (p.y - cy) * scale;
                ctx.fillStyle = '#ea4335'; ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            });
            if(s.shapeType === 'triangle') {
                const ang0 = this.getAngle(s.pts[0], s.pts[1], s.pts[2]); const ang1 = this.getAngle(s.pts[1], s.pts[2], s.pts[0]); const ang2 = this.getAngle(s.pts[2], s.pts[0], s.pts[1]);
                const info = document.getElementById('adv-tri-info'); if (info) info.innerHTML = `角A: ${ang0.toFixed(0)}°, 角B: ${ang1.toFixed(0)}°, 角C: ${ang2.toFixed(0)}°`;
            }
        }
    },

    initAdvPreviewEvents() {
        const c = document.getElementById('adv-preview-canvas'); let draggingIdx = -1;
        c.onpointerdown = e => {
            if(this.advShape.shapeType !== 'triangle' && this.advShape.shapeType !== 'rect') return;
            const rect = c.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top;
            const t = this.advPreviewTransform;
            this.advShape.pts.forEach((p, i) => { const px = 140 + (p.x - t.cx) * t.scale; const py = 140 + (p.y - t.cy) * t.scale; if (Math.hypot(x - px, y - py) < 15) { draggingIdx = i; c.setPointerCapture(e.pointerId); } });
        };
        c.onpointermove = e => {
            if(draggingIdx === -1) return;
            const rect = c.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; const t = this.advPreviewTransform;
            let targetX = t.cx + (x - 140) / t.scale; let targetY = t.cy + (y - 140) / t.scale;
            const snapDist = 15 / t.scale;
            this.advShape.pts.forEach((p, i) => { if(i === draggingIdx) return; if(Math.abs(targetX - p.x) < snapDist) targetX = p.x; if(Math.abs(targetY - p.y) < snapDist) targetY = p.y; });
            this.advShape.pts[draggingIdx] = {x: targetX, y: targetY};
            
            if(this.advShape.shapeType === 'triangle') {
                const len1 = Math.hypot(this.advShape.pts[1].x - this.advShape.pts[0].x, this.advShape.pts[1].y - this.advShape.pts[0].y) / CM_RATIO;
                const len2 = Math.hypot(this.advShape.pts[2].x - this.advShape.pts[1].x, this.advShape.pts[2].y - this.advShape.pts[1].y) / CM_RATIO;
                const len3 = Math.hypot(this.advShape.pts[0].x - this.advShape.pts[2].x, this.advShape.pts[0].y - this.advShape.pts[2].y) / CM_RATIO;
                const inA = document.getElementById('tri-a'); if(inA) inA.value = len1.toFixed(2);
                const inB = document.getElementById('tri-b'); if(inB) inB.value = len2.toFixed(2);
                const inC = document.getElementById('tri-c'); if(inC) inC.value = len3.toFixed(2);
            } else {
                let b = this.getStrokeBBox(this.advShape);
                const inW = document.getElementById('adv-w'); if(inW) inW.value = ((b.maxX - b.minX) / CM_RATIO).toFixed(2);
                const inH = document.getElementById('adv-h'); if(inH) inH.value = ((b.maxY - b.minY) / CM_RATIO).toFixed(2);
            }
            this.updateAdvPreview();
        };
        c.onpointerup = e => { draggingIdx = -1; };
    },

    solveTriangle() {
        let a = parseFloat(document.getElementById('tri-a').value); let b = parseFloat(document.getElementById('tri-b').value); let c = parseFloat(document.getElementById('tri-c').value);
        let A = parseFloat(document.getElementById('tri-A').value); let B = parseFloat(document.getElementById('tri-B').value); let C = parseFloat(document.getElementById('tri-C').value);
        const d2r = Math.PI/180;
        
        if(!isNaN(A) && !isNaN(B) && isNaN(C)) C = 180 - A - B;
        if(!isNaN(B) && !isNaN(C) && isNaN(A)) A = 180 - B - C;
        if(!isNaN(C) && !isNaN(A) && isNaN(B)) B = 180 - C - A;

        if(!isNaN(a) && !isNaN(b) && !isNaN(c)) { } 
        else if(!isNaN(a) && !isNaN(b) && !isNaN(C)) { c = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(C*d2r)); }
        else if(!isNaN(b) && !isNaN(c) && !isNaN(A)) { a = Math.sqrt(b*b + c*c - 2*b*c*Math.cos(A*d2r)); }
        else if(!isNaN(c) && !isNaN(a) && !isNaN(B)) { b = Math.sqrt(c*c + a*a - 2*c*a*Math.cos(B*d2r)); }
        else if(!isNaN(a) && !isNaN(A) && !isNaN(B) && !isNaN(C)) { b = a * Math.sin(B*d2r) / Math.sin(A*d2r); c = a * Math.sin(C*d2r) / Math.sin(A*d2r); }
        else if(!isNaN(b) && !isNaN(A) && !isNaN(B) && !isNaN(C)) { a = b * Math.sin(A*d2r) / Math.sin(B*d2r); c = b * Math.sin(C*d2r) / Math.sin(B*d2r); }
        else if(!isNaN(c) && !isNaN(A) && !isNaN(B) && !isNaN(C)) { a = c * Math.sin(A*d2r) / Math.sin(C*d2r); b = c * Math.sin(B*d2r) / Math.sin(C*d2r); }
        else { alert("入力が不足しています。最低3つの要素を入力してください。"); return; }

        if(a+b<=c || b+c<=a || c+a<=b || isNaN(a) || isNaN(b) || isNaN(c)) { alert("この数値では三角形が成立しません。"); return; }

        let calcB = Math.acos((c*c + a*a - b*b)/(2*c*a));
        let p0 = {x: c * Math.cos(calcB) * CM_RATIO, y: -c * Math.sin(calcB) * CM_RATIO}; 
        let p1 = {x: a * CM_RATIO, y: 0}; let p2 = {x: 0, y: 0}; 

        const cx = (p0.x + p1.x + p2.x)/3; const cy = (p0.y + p1.y + p2.y)/3;
        const ob = this.getStrokeBBox(this.advShape); const ocx = (ob.minX + ob.maxX)/2; const ocy = (ob.minY + ob.maxY)/2;
        
        this.advShape.pts =[{x: ocx + (p0.x - cx), y: ocy + (p0.y - cy)}, {x: ocx + (p1.x - cx), y: ocy + (p1.y - cy)}, {x: ocx + (p2.x - cx), y: ocy + (p2.y - cy)}];
        this.updateAdvPreview();
    },

    applyAdvScale() {
        const wStr = document.getElementById('adv-w').value; const hStr = document.getElementById('adv-h').value;
        if(wStr==='' || hStr==='') return;
        const nw = parseFloat(wStr) * CM_RATIO; const nh = parseFloat(hStr) * CM_RATIO;
        if(isNaN(nw) || isNaN(nh) || nw <= 0 || nh <= 0) return;
        
        let b = this.getStrokeBBox(this.advShape); let ow = b.maxX - b.minX; let oh = b.maxY - b.minY;
        let sx = ow === 0 ? 1 : nw / ow; let sy = oh === 0 ? 1 : nh / oh;
        
        if((this.advShape.shapeType === 'triangle' || this.advShape.shapeType === 'rect') && this.advShape.pts) {
            this.advShape.pts.forEach(p => { p.x = b.minX + (p.x - b.minX) * sx; p.y = b.minY + (p.y - b.minY) * sy; });
        } else if(this.advShape.shapeType === 'circle') { this.advShape.x2 = this.advShape.x1 + nw; this.advShape.y2 = this.advShape.y1 + nh; } 
        else if(this.advShape.type === 'image') { this.advShape.w = nw; this.advShape.h = nh; }
        this.updateAdvPreview();
    },

    applyAdvLine() {
        const wStr = document.getElementById('adv-w').value; const hStr = document.getElementById('adv-h').value;
        if(wStr==='' || hStr==='') return;
        const len = parseFloat(wStr) * CM_RATIO; const deg = parseFloat(hStr) * Math.PI / 180;
        if(isNaN(len) || isNaN(deg)) return;
        
        this.advShape.x2 = this.advShape.x1 + len * Math.cos(deg); this.advShape.y2 = this.advShape.y1 + len * Math.sin(deg);
        this.updateAdvPreview();
    },

    applyAdvancedShapeSettings() {
        const s = this.lasso.selectedStrokes[0]; Object.assign(s, this.advShape);
        this.hideModal(); this.lasso.bbox = this.getStrokeBBox(s); this.updateLassoUI(); this.renderAllPages(); this.saveNote(); this.pushUndo();
    },

    setupWindowEvents() {
        const ws = document.getElementById('workspace');
        ws.addEventListener('wheel', e => {
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault(); const rect = ws.getBoundingClientRect(); const cx = e.clientX - rect.left; const cy = e.clientY - rect.top;
                let zoomDelta = e.deltaY > 0 ? 0.9 : 1.1; let newZoom = this.zoom * zoomDelta; newZoom = Math.min(Math.max(0.3, newZoom), 5);
                const wx = (ws.scrollLeft + cx) / this.zoom; const wy = (ws.scrollTop + cy) / this.zoom;
                this.zoom = newZoom; this.updateWrapperSize(); document.getElementById('zoom-indicator').innerText=`${Math.round(this.zoom * 100)}%`;
                ws.scrollLeft = (wx * this.zoom) - cx; ws.scrollTop = (wy * this.zoom) - cy;
            }
        }, {passive: false});
        
        ws.addEventListener('pointerdown', e => { 
            this.activeTouches.set(e.pointerId, e); 
            if(this.activeTouches.size === 1 && (this.activeTool === 'pan' || (!this.allowTouchDraw && e.pointerType === 'touch' && DRAW_TOOLS.includes(this.activeTool)))) { this.isPanning = true; this.pX = e.clientX; this.pY = e.clientY; this.sX = ws.scrollLeft; this.sY = ws.scrollTop; }
            if(this.activeTouches.size === 2){ 
                this.isPanning = false; this.isDrawing = false; document.querySelectorAll('.temp-canvas').forEach(c => c.getContext('2d').clearRect(0,0,1240,1754));
                const pts = Array.from(this.activeTouches.values()); this.iDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY); this.iZoom = this.zoom; this.iCx = (pts[0].clientX + pts[1].clientX) / 2; this.iCy = (pts[0].clientY + pts[1].clientY) / 2; this.iScrollX = ws.scrollLeft; this.iScrollY = ws.scrollTop;
            } 
        });

        window.addEventListener('pointermove', e => { 
            if(this.activeTouches.has(e.pointerId)) this.activeTouches.set(e.pointerId, e);
            if(this.isPanning && this.activeTouches.size === 1) { ws.scrollLeft = this.sX - (e.clientX - this.pX); ws.scrollTop = this.sY - (e.clientY - this.pY); return; }
            if(this.activeTouches.size === 2){ 
                const pts = Array.from(this.activeTouches.values()); const cx = (pts[0].clientX + pts[1].clientX) / 2; const cy = (pts[0].clientY + pts[1].clientY) / 2;
                const d = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY); let newZoom = this.iZoom * (d / this.iDist); newZoom = Math.min(Math.max(0.3, newZoom), 5);
                this.zoom = newZoom; this.updateWrapperSize(); document.getElementById('zoom-indicator').innerText=`${Math.round(this.zoom * 100)}%`;
                const wx = (this.iScrollX + this.iCx) / this.iZoom; const wy = (this.iScrollY + this.iCy) / this.iZoom; ws.scrollLeft = (wx * this.zoom) - cx; ws.scrollTop = (wy * this.zoom) - cy;
            } 
            if(this.lasso.isResizing) this.handleLassoResize(e); if(this.lasso.isEditingShape) this.handleShapeEdit(e); 
        });

        const endTouch = e => {
            this.activeTouches.delete(e.pointerId); if(this.activeTouches.size === 0) this.isPanning = false;
            if(this.lasso.isResizing) { this.lasso.isResizing = false; this.saveNote(); this.pushUndo(); }
            if(this.lasso.isEditingShape) { this.lasso.isEditingShape = false; const s = this.lasso.selectedStrokes[0]; this.lasso.bbox = this.getStrokeBBox(s); this.updateLassoUI(); this.saveNote(); this.pushUndo(); }
        };

        window.addEventListener('pointerup', endTouch); window.addEventListener('pointercancel', endTouch);
        document.addEventListener('keydown', e => { if((e.key === 'Backspace' || e.key === 'Delete') && this.lasso.active && !this.textInput.active) this.deleteLasso(); });
    },
    
    setupTooltips() { document.querySelectorAll('[data-desc]').forEach(el => { el.addEventListener('mouseenter', e => { const t=document.getElementById('tooltip'); t.innerText=el.dataset.desc; t.style.left=e.clientX+'px'; t.style.top=(e.clientY+20)+'px'; t.style.opacity=1; }); el.addEventListener('mouseleave', () => document.getElementById('tooltip').style.opacity=0); }); },
    toggleTouchDraw(){ this.allowTouchDraw=!this.allowTouchDraw; document.getElementById('touch-draw-btn').classList.toggle('active', this.allowTouchDraw); },
    toggleSnap(){ this.isSnap=!this.isSnap; document.getElementById('snap-btn').classList.toggle('active', this.isSnap); },
    
    pushUndo(){ if(this.undoStack.length>20)this.undoStack.shift(); this.undoStack.push(JSON.stringify(this.currentNote.pages)); },
    undo(){ if(this.undoStack.length>1){ this.redoStack.push(this.undoStack.pop()); this.currentNote.pages=JSON.parse(this.undoStack[this.undoStack.length-1]); this.renderAllPages(); } },
    redo(){ if(this.redoStack.length){ const s=this.redoStack.pop(); this.undoStack.push(s); this.currentNote.pages=JSON.parse(s); this.renderAllPages(); } },
    saveNote(){ if(this.currentNote){ this.currentNote.lastModified=Date.now(); const tx=this.db.transaction("notes","readwrite"); tx.objectStore("notes").put(this.currentNote); } },
    
    exportPage(i){ 
        const c=document.createElement('canvas'); c.width=1240; c.height=1754; const ctx=c.getContext('2d'); 
        ctx.fillStyle=this.currentNote.bgColor||'#fff'; ctx.fillRect(0,0,1240,1754); 
        const pat = this.currentNote.bgPattern || 'dot'; ctx.fillStyle = 'rgba(0,0,0,0.1)';
        if(pat === 'dot') { for(let y=0; y<1754; y+=25) for(let x=0; x<1240; x+=25) { ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill(); } } 
        else if(pat === 'line') { for(let y=40; y<1754; y+=40) ctx.fillRect(0, y, 1240, 1); } 
        else if(pat === 'grid') { for(let y=0; y<1754; y+=25) ctx.fillRect(0, y, 1240, 1); for(let x=0; x<1240; x+=25) ctx.fillRect(x, 0, 1, 1754); }
        ctx.drawImage(document.querySelectorAll('.main-canvas')[i],0,0); 
        const l=document.createElement('a'); l.download='page.png'; l.href=c.toDataURL(); l.click(); 
    },
    
    handleImageInsert(e){ 
        const f=e.target.files[0]; const r=new FileReader(); 
        r.onload=ev=>{ const img=new Image(); img.onload=()=>{ this.imageCache[ev.target.result]=img; const ws = document.getElementById('workspace'); const pageIdx = Math.min(this.currentNote.pages.length - 1, Math.max(0, Math.floor(ws.scrollTop / (1754 * this.zoom)))); let w = img.width, h = img.height; if(w > 500) { h = h * (500/w); w = 500; } this.currentNote.pages[pageIdx].strokes.push({type:'image',src:ev.target.result,x:100,y:100,w:w,h:h}); this.renderAllPages(); this.pushUndo(); this.saveNote(); }; img.src=ev.target.result; }; r.readAsDataURL(f); 
    },
    
    commitText(){ const el=document.getElementById('text-input-box'); if(!el.classList.contains('hidden')){ this.currentNote.pages[this.textInput.pageIdx].strokes.push({type:'text',text:el.innerText,x:this.textInput.x,y:this.textInput.y,w:200,h:40,color:this.tools.text.color,size:this.tools.text.size}); el.classList.add('hidden'); this.renderAllPages(); } },
    handleTextClick(pt,idx){ this.textInput={pageIdx:idx,x:pt.x,y:pt.y}; const el=document.getElementById('text-input-box'); el.style.left=(pt.x*this.zoom)+'px'; el.style.top=(idx*1794+pt.y*this.zoom)+'px'; el.style.color = this.tools.text.color; el.style.fontSize = (this.tools.text.size * this.zoom) + 'px'; el.innerHTML = ""; el.classList.remove('hidden'); setTimeout(() => el.focus(), 50); },
    toggleLassoMenu(e){ e.stopPropagation(); document.getElementById('lasso-menu').classList.toggle('hidden'); },
    duplicateLasso(e){ 
        if(e) e.stopPropagation(); const copies = JSON.parse(JSON.stringify(this.lasso.selectedStrokes));
        copies.forEach(s => {
            if(['image','text','graph','table'].includes(s.type)) { s.x+=40; s.y+=40; }
            else if(s.type === 'shape') { if((s.shapeType === 'triangle' || s.shapeType === 'rect') && s.pts) s.pts.forEach(p=>{p.x+=40; p.y+=40;}); s.x1+=40; s.x2+=40; s.y1+=40; s.y2+=40; }
            else { s.points.forEach(p => { p.x+=40; p.y+=40; }); }
        });
        this.currentNote.pages[this.lasso.pageIdx].strokes.push(...copies); this.commitLassoMove();
    },
    deleteLasso(e){ if(e) e.stopPropagation(); this.currentNote.pages[this.lasso.pageIdx].strokes=this.currentNote.pages[this.lasso.pageIdx].strokes.filter(s=>!this.lasso.selectedStrokes.includes(s)); this.lasso.active=false; document.getElementById('lasso-ui')?.classList.add('hidden'); this.renderAllPages(); }
};

fnApp.init();
    // 🌟 ダークモード同期機能 🌟
function syncTheme() {
    const theme = localStorage.getItem('app_theme') || 'light';
    if (theme === 'dark') document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
}
syncTheme();
setInterval(syncTheme, 500);
    
</script>
