<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Elite IDE - Local Access & Multi-Lang</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #181818; --header-bg: #333; --active-blue: #0078d4; --text-muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000; }
        
        /* Header & Navbar */
        header { height: 45px; background: var(--header-bg); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 12px; }
        .toolbar { display: flex; gap: 8px; align-items: center; }
        .btn { background: #444; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; font-weight: 600; }
        .btn:hover { background: #555; }
        .btn-primary { background: var(--active-blue); }
        .lang-select { background: #222; color: #ccc; border: 1px solid #444; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; outline: none; }

        #main { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar Explorer */
        #sidebar { width: 260px; background: var(--sidebar-bg); color: #ccc; display: flex; flex-direction: column; border-right: 1px solid #000; }
        .sidebar-header { padding: 12px 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; color: var(--text-muted); }
        .sidebar-icons { display: flex; gap: 10px; font-size: 13px; }
        .sidebar-icons i { cursor: pointer; transition: 0.2s; }
        .sidebar-icons i:hover { color: #fff; }

        #file-tree { flex: 1; overflow-y: auto; padding: 10px 0; font-size: 13px; user-select: none; }
        .tree-item { padding: 5px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; }
        .tree-item:hover { background: #2a2d2e; }
        .tree-item.active { background: #37373d; color: #fff; border-left-color: var(--active-blue); }
        .tree-folder { color: #dcb67a; font-weight: bold; }
        .indent { margin-left: 15px; border-left: 1px solid #333; }

        /* Editor Area */
        #editor-pane { flex: 1; display: flex; flex-direction: column; }
        #ace-editor { flex: 1; font-size: 16px; }
        .tabs { height: 35px; background: #252526; display: flex; overflow-x: auto; border-bottom: 1px solid #111; }
        .tab { background: #2d2d2d; color: #999; padding: 0 15px; display: flex; align-items: center; font-size: 11px; border-right: 1px solid #1e1e1e; min-width: 120px; white-space: nowrap; }
        .tab.active { background: #1e1e1e; color: #fff; border-top: 1px solid var(--active-blue); }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <span style="letter-spacing:1px; font-weight:900;">ELITE IDE PRO</span>
        <select class="lang-select" id="lang-toggle" onchange="switchLang(this.value)">
            <option value="jp">日本語</option>
            <option value="en">English</option>
        </select>
    </div>
    <div class="toolbar">
        <button class="btn" id="btn-open-folder" onclick="openLocalFolder()"><i class="fas fa-folder-open"></i> <span>フォルダを開く</span></button>
        <button class="btn btn-primary" id="btn-save" onclick="saveActiveFile()"><i class="fas fa-save"></i> <span>保存</span></button>
        <button class="btn" id="btn-preview" onclick="openLivePreview()"><i class="fas fa-play"></i> <span>プレビュー</span></button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header">
            <span id="label-explorer">エクスプローラー</span>
            <div class="sidebar-icons">
                <i class="fas fa-file-circle-plus" onclick="createNewItem('file')"></i>
                <i class="fas fa-folder-plus" onclick="createNewItem('folder')"></i>
            </div>
        </div>
        <div id="file-tree"></div>
    </div>

    <div id="editor-pane">
        <div class="tabs" id="tabs-container"></div>
        <div id="ace-editor"></div>
    </div>
</div>

<script>
    // --- 言語データ ---
    const i18n = {
        jp: {
            openFolder: "フォルダを開く",
            save: "保存",
            preview: "プレビュー",
            explorer: "エクスプローラー",
            newFilePrompt: "新しいファイル名を入力:",
            newFolderPrompt: "新しいフォルダ名を入力:",
            saveSuccess: "保存しました！",
            accessDenied: "フォルダへのアクセスが拒否されました。"
        },
        en: {
            openFolder: "Open Folder",
            save: "Save",
            preview: "Preview",
            explorer: "Explorer",
            newFilePrompt: "Enter file name:",
            newFolderPrompt: "Enter folder name:",
            saveSuccess: "Saved successfully!",
            accessDenied: "Folder access denied."
        }
    };

    let currentLang = 'jp';

    // --- ファイルシステム管理 ---
    let vfs = { name: 'Root', type: 'folder', children: {}, isOpen: true };
    let activeFileId = null;
    let directoryHandle = null; // 本物のフォルダハンドル

    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");
    editor.setOptions({ useSoftTabs: true, tabSize: 2 });

    // --- フォルダを開く（File System Access API） ---
    async function openLocalFolder() {
        try {
            directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            vfs = { name: directoryHandle.name, type: 'folder', children: {}, isOpen: true, handle: directoryHandle };
            await scanDirectory(directoryHandle, vfs.children);
            renderTree();
        } catch (err) {
            console.error(err);
            alert(i18n[currentLang].accessDenied);
        }
    }

    async function scanDirectory(handle, childrenObj) {
        for await (const entry of handle.values()) {
            if (entry.kind === 'file') {
                childrenObj[entry.name] = { name: entry.name, type: 'file', handle: entry, content: null };
            } else if (entry.kind === 'directory') {
                const newFolder = { name: entry.name, type: 'folder', children: {}, isOpen: false, handle: entry };
                childrenObj[entry.name] = newFolder;
                // 再帰的にスキャンする場合はここで行うが、重くなるのでクリック時に開く仕様が一般的
            }
        }
    }

    // --- 木構造の描画 ---
    function renderTree() {
        const treeEl = document.getElementById('file-tree');
        treeEl.innerHTML = '';
        drawNode(vfs, treeEl, vfs.name);
    }

    function drawNode(node, parentEl, path) {
        const el = document.createElement('div');
        el.className = `tree-item ${activeFileId === path ? 'active' : ''}`;
        
        if (node.type === 'folder') {
            el.innerHTML = `<i class="fas ${node.isOpen ? 'fa-chevron-down' : 'fa-chevron-right'}"></i> <i class="fas fa-folder"></i> ${node.name}`;
            el.onclick = async (e) => {
                e.stopPropagation();
                node.isOpen = !node.isOpen;
                if (node.isOpen && Object.keys(node.children).length === 0) {
                    await scanDirectory(node.handle, node.children);
                }
                renderTree();
            };
        } else {
            el.innerHTML = `<i class="fas fa-file-code"></i> ${node.name}`;
            el.onclick = (e) => { e.stopPropagation(); openFile(path, node); };
        }
        parentEl.appendChild(el);

        if (node.type === 'folder' && node.isOpen) {
            const container = document.createElement('div');
            container.className = 'indent';
            Object.keys(node.children).sort().forEach(key => {
                drawNode(node.children[key], container, path + '/' + key);
            });
            parentEl.appendChild(container);
        }
    }

    // --- ファイルを開く & 保存 ---
    async function openFile(id, node) {
        if (node.content === null) {
            const file = await node.handle.getFile();
            node.content = await file.text();
        }
        activeFileId = id;
        editor.setValue(node.content, -1);
        editor.getSession().setMode(getAceMode(node.name));
        
        document.getElementById('tabs-container').innerHTML = `<div class="tab active">${node.name}</div>`;
        renderTree();
    }

    async function saveActiveFile() {
        if (!activeFileId) return;
        const node = findNodeByPath(vfs, activeFileId);
        if (node && node.handle) {
            const writable = await node.handle.createWritable();
            const content = editor.getValue();
            await writable.write(content);
            await writable.close();
            node.content = content;
            alert(i18n[currentLang].saveSuccess);
        }
    }

    function findNodeByPath(root, path) {
        const parts = path.split('/');
        let curr = root;
        // 簡易実装：パスを辿る
        return root.children[parts[parts.length-1]] || root;
    }

    // --- 言語切り替え ---
    function switchLang(lang) {
        currentLang = lang;
        document.getElementById('btn-open-folder').querySelector('span').innerText = i18n[lang].openFolder;
        document.getElementById('btn-save').querySelector('span').innerText = i18n[lang].save;
        document.getElementById('btn-preview').querySelector('span').innerText = i18n[lang].preview;
        document.getElementById('label-explorer').innerText = i18n[lang].explorer;
    }

    function getAceMode(filename) {
        if (filename.endsWith('.html')) return 'ace/mode/html';
        if (filename.endsWith('.css')) return 'ace/mode/css';
        if (filename.endsWith('.js')) return 'ace/mode/javascript';
        return 'ace/mode/text';
    }

    function openLivePreview() {
        window.open('live-preview.html', 'LivePreview');
    }

    // 初期化
    renderTree();
</script>
</body>
</html>
