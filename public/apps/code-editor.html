<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Elite IDE - Ultimate Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #252526; --header-bg: #2d2d2d; --active-blue: #007acc; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #1e1e1e; color: #fff; }
        
        /* Header */
        header { height: 40px; background: var(--header-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 12px; border-bottom: 1px solid #111; }
        .toolbar { display: flex; gap: 5px; }
        .btn { background: transparent; color: #ccc; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn:hover { background: #3c3c3c; color: #fff; }
        .btn-primary { background: var(--active-blue); color: white; font-weight: bold; }
        .lang-select { background: #3c3c3c; color: #fff; border: 1px solid var(--border); padding: 2px 5px; border-radius: 3px; font-size: 10px; }

        #main { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 250px; background: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid #000; }
        .sidebar-header { padding: 10px 15px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #888; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-actions { display: flex; gap: 10px; }
        .sidebar-actions i { cursor: pointer; color: #888; transition: 0.1s; font-size: 14px; }
        .sidebar-actions i:hover { color: #fff; }

        #file-tree { flex: 1; overflow-y: auto; font-size: 13px; }
        .tree-item { padding: 6px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #aaa; border-left: 3px solid transparent; transition: 0.2s; }
        .tree-item:hover { background: #2a2d2e; }
        .tree-item.active { background: #37373d; color: #fff; border-left-color: var(--active-blue); }
        .tree-item.preview-target { color: #e2c08d; } /* プレビュー対象 */

        /* Editor Area */
        #editor-pane { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; }
        .tabs { height: 35px; background: #252526; display: flex; border-bottom: 1px solid #111; }
        .tab { background: #1e1e1e; color: #fff; padding: 0 20px; display: flex; align-items: center; font-size: 11px; border-right: 1px solid #111; border-top: 1px solid var(--active-blue); }
        #ace-editor { flex: 1; font-size: 15px; font-weight: 700; } /* 太字で黒く見やすく */
    </style>
</head>
<body>

<header>
    <div style="display:flex; gap:15px; align-items:center;">
        <span style="font-weight:900; color:var(--active-blue); letter-spacing:1px;">ELITE IDE</span>
        <select class="lang-select" id="lang-toggle" onchange="switchLang(this.value)">
            <option value="jp">日本語</option>
            <option value="en">English</option>
        </select>
    </div>
    <div class="toolbar">
        <button class="btn" onclick="openLocalFile()"><i class="fas fa-file-import"></i> <span data-i18n="openFile">ファイルを開く</span></button>
        <button class="btn" onclick="openLocalFolder()"><i class="fas fa-folder-open"></i> <span data-i18n="openFolder">フォルダを開く</span></button>
        <button class="btn btn-primary" onclick="saveFile()"><i class="fas fa-save"></i> <span data-i18n="save">保存</span></button>
        <button class="btn btn-primary" style="background:#e2c08d; color:#000" onclick="openLivePreview()"><i class="fas fa-play"></i> <span data-i18n="preview">LIVE</span></button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header">
            <span data-i18n="explorer">EXPLORER</span>
            <div class="sidebar-actions">
                <!-- 🌟 新規ファイル作成ボタン -->
                <i class="fas fa-file-circle-plus" title="New File" onclick="createNewFile()"></i>
                <i class="fas fa-sync" title="Refresh" onclick="renderTree()"></i>
            </div>
        </div>
        <div id="file-tree"></div>
    </div>
    <div id="editor-pane">
        <div class="tabs" id="tabs-container"></div>
        <div id="ace-editor"></div>
    </div>
</div>

<script>
    const i18n = {
        jp: { openFile: "ファイルを開く", openFolder: "フォルダを開く", save: "保存", preview: "LIVE", explorer: "エクスプローラー", newFile: "新しいファイル名を入力 (例: index.html):", setPreview: "プレビュー対象に設定", noFile: "ファイルがありません" },
        en: { openFile: "Open File", openFolder: "Open Folder", save: "Save", preview: "LIVE", explorer: "Explorer", newFile: "Enter new filename (e.g., index.html):", setPreview: "Set as Preview Target", noFile: "No files" }
    };
    let currentLang = 'jp';

    let files = {}; 
    let activeFileId = null;
    let previewFileId = null;
    let rootHandle = null;

    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");

    // --- ファイル作成機能 🌟 ---
    async function createNewFile() {
        const name = prompt(i18n[currentLang].newFile);
        if (!name) return;

        if (rootHandle) {
            // A. 実際のローカルフォルダ内にファイルを作成
            try {
                const handle = await rootHandle.getFileHandle(name, { create: true });
                await addFileToVFS(handle);
                alert("Created: " + name);
            } catch (e) {
                alert("作成に失敗しました: " + e.message);
            }
        } else {
            // B. フォルダを開いていない場合、ブラウザメモリ内に一時作成
            files[name] = { handle: null, name, content: '', type: 'file' };
            if (name.endsWith('.html') && !previewFileId) previewFileId = name;
            renderTree();
            openFile(name);
        }
    }

    // --- ファイル/フォルダを開く ---
    async function openLocalFile() {
        try {
            const [handle] = await window.showOpenFilePicker();
            await addFileToVFS(handle);
        } catch(e){}
    }

    async function openLocalFolder() {
        try {
            rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            files = {}; 
            for await (const entry of rootHandle.values()) {
                if (entry.kind === 'file') await addFileToVFS(entry);
            }
            renderTree();
        } catch(e){}
    }

    async function addFileToVFS(handle) {
        const file = await handle.getFile();
        const content = await file.text();
        files[handle.name] = { handle, name: handle.name, content, type: 'file' };
        if (handle.name.endsWith('.html') && !previewFileId) previewFileId = handle.name;
        renderTree();
        openFile(handle.name);
    }

    // --- 描画ロジック ---
    function renderTree() {
        const tree = document.getElementById('file-tree');
        tree.innerHTML = '';
        const sortedNames = Object.keys(files).sort();
        
        if (sortedNames.length === 0) {
            tree.innerHTML = `<div style="padding:20px; color:#555; font-size:11px;">${i18n[currentLang].noFile}</div>`;
        }

        sortedNames.forEach(id => {
            const item = document.createElement('div');
            item.className = `tree-item ${activeFileId === id ? 'active' : ''} ${previewFileId === id ? 'preview-target' : ''}`;
            const icon = id.endsWith('.html') ? 'fa-html5' : id.endsWith('.css') ? 'fa-css3-alt' : id.endsWith('.js') ? 'fa-js' : 'fa-file-code';
            item.innerHTML = `<i class="fab ${icon}"></i> ${id} ${previewFileId === id ? ' <small>(LIVE)</small>' : ''}`;
            
            // 右クリックでプレビュー指定
            item.oncontextmenu = (e) => {
                e.preventDefault();
                if(id.endsWith('.html')) {
                    previewFileId = id;
                    renderTree();
                }
            };
            item.onclick = () => openFile(id);
            tree.appendChild(item);
        });
    }

    function openFile(id) {
        if (activeFileId && files[activeFileId]) files[activeFileId].content = editor.getValue();
        activeFileId = id;
        editor.setValue(files[id].content, -1);
        editor.getSession().setMode(getMode(id));
        document.getElementById('tabs-container').innerHTML = `<div class="tab">${id}</div>`;
        renderTree();
    }

    async function saveFile() {
        if (!activeFileId) return;
        const file = files[activeFileId];
        file.content = editor.getValue();
        if (file.handle) {
            const writable = await file.handle.createWritable();
            await writable.write(file.content);
            await writable.close();
            alert("Disk Saved!");
        } else {
            alert("Memory Saved! (Open a folder to save on disk)");
        }
    }

    function getMode(n) {
        if(n.endsWith('.html')) return 'ace/mode/html';
        if(n.endsWith('.css')) return 'ace/mode/css';
        if(n.endsWith('.js')) return 'ace/mode/javascript';
        return 'ace/mode/text';
    }

    function openLivePreview() {
        if (!previewFileId) return alert("HTMLファイルを選択してください");
        files[activeFileId].content = editor.getValue();
        let html = files[previewFileId].content;

        // CSS/JSの自動合体
        Object.keys(files).forEach(name => {
            if (name.endsWith('.css')) {
                const cssTag = new RegExp(`<link[^>]*href=["']${name}["'][^>]*>`, 'g');
                html = html.replace(cssTag, `<style>${files[name].content}</style>`);
            }
            if (name.endsWith('.js')) {
                const jsTag = new RegExp(`<script[^>]*src=["']${name}["'][^>]*><\/script>`, 'g');
                html = html.replace(jsTag, `<script>${files[name].content}<\/script>`);
            }
        });

        localStorage.setItem('elite_live_code', html);
        window.open('live-preview.html', 'LivePreview');
    }

    function switchLang(l) {
        currentLang = l;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = i18n[l][el.getAttribute('data-i18n')];
        });
        renderTree();
    }
</script>
</body>
</html>
