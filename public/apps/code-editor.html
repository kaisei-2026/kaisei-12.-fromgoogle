<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Elite IDE - Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #1e1e1e; --header-bg: #2d2d2d; --active-blue: #007acc; --text: #cccccc; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #1e1e1e; color: #fff; }
        
        /* Header */
        header { height: 40px; background: var(--header-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 12px; border-bottom: 1px solid #111; }
        .toolbar { display: flex; gap: 5px; }
        .btn { background: transparent; color: #ccc; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn:hover { background: #3c3c3c; color: #fff; }
        .btn-primary { background: var(--active-blue); color: white; }
        .btn-primary:hover { background: #1a8ad4; }
        .lang-select { background: #3c3c3c; color: #fff; border: 1px solid var(--border); padding: 2px 5px; border-radius: 3px; font-size: 10px; }

        #main { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 250px; background: #252526; display: flex; flex-direction: column; border-right: 1px solid #000; }
        .sidebar-header { padding: 10px 15px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #888; display: flex; justify-content: space-between; }
        .sidebar-actions { display: flex; gap: 10px; }
        .sidebar-actions i { cursor: pointer; transition: 0.1s; }
        .sidebar-actions i:hover { color: #fff; }

        #file-tree { flex: 1; overflow-y: auto; font-size: 13px; }
        .tree-item { padding: 4px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #aaa; white-space: nowrap; }
        .tree-item:hover { background: #2a2d2e; }
        .tree-item.active { background: #37373d; color: #fff; }
        .tree-item.preview-target { border-right: 4px solid #e2c08d; color: #e2c08d; } /* プレビュー対象の目印 */

        /* Editor */
        #editor-pane { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; }
        .tabs { height: 35px; background: #252526; display: flex; overflow-x: auto; }
        .tab { background: #2d2d2d; color: #969696; padding: 0 15px; display: flex; align-items: center; font-size: 11px; border-right: 1px solid #1e1e1e; min-width: 100px; }
        .tab.active { background: #1e1e1e; color: #fff; border-top: 1px solid var(--active-blue); }
        #ace-editor { flex: 1; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; gap:15px; align-items:center;">
        <span style="font-weight:900; color:var(--active-blue);">ELITE IDE</span>
        <select class="lang-select" id="lang-toggle" onchange="switchLang(this.value)">
            <option value="jp">日本語</option>
            <option value="en">English</option>
        </select>
    </div>
    <div class="toolbar">
        <button class="btn" onclick="openLocalFile()"><i class="fas fa-file-import"></i> <span data-i18n="openFile">ファイルを開く</span></button>
        <button class="btn" onclick="openLocalFolder()"><i class="fas fa-folder-open"></i> <span data-i18n="openFolder">フォルダを開く</span></button>
        <button class="btn btn-primary" onclick="saveFile()"><i class="fas fa-save"></i> <span data-i18n="save">保存</span></button>
        <button class="btn btn-primary" style="background:#e2c08d; color:#000" onclick="openLivePreview()"><i class="fas fa-play"></i> <span data-i18n="preview">LIVE</span></button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header">
            <span data-i18n="explorer">EXPLORER</span>
            <div class="sidebar-actions">
                <i class="fas fa-file-plus" title="New File" onclick="createNewFile()"></i>
            </div>
        </div>
        <div id="file-tree"></div>
    </div>
    <div id="editor-pane">
        <div class="tabs" id="tabs-container"></div>
        <div id="ace-editor"></div>
    </div>
</div>

<script>
    const i18n = {
        jp: { openFile: "ファイルを開く", openFolder: "フォルダを開く", save: "保存", preview: "LIVE", explorer: "エクスプローラー", newFile: "新規ファイル名:", setPreview: "プレビュー対象に設定" },
        en: { openFile: "Open File", openFolder: "Open Folder", save: "Save", preview: "LIVE", explorer: "Explorer", newFile: "New filename:", setPreview: "Set as Preview Target" }
    };
    let currentLang = 'jp';

    let files = {}; // { id: { handle, name, content, type } }
    let activeFileId = null;
    let previewFileId = null; // プレビューの起点となるHTMLのID
    let rootHandle = null;

    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");

    // --- ファイル/フォルダを開く ---
    async function openLocalFile() {
        const [handle] = await window.showOpenFilePicker();
        await addFileToVFS(handle);
    }

    async function openLocalFolder() {
        rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        files = {}; 
        await scanDir(rootHandle);
        renderTree();
    }

    async function scanDir(handle) {
        for await (const entry of handle.values()) {
            if (entry.kind === 'file') await addFileToVFS(entry);
        }
    }

    async function addFileToVFS(handle) {
        const file = await handle.getFile();
        const content = await file.text();
        files[handle.name] = { handle, name: handle.name, content, type: 'file' };
        if (handle.name.endsWith('.html') && !previewFileId) previewFileId = handle.name;
        renderTree();
        openFile(handle.name);
    }

    // --- 新規作成 ---
    async function createNewFile() {
        const name = prompt(i18n[currentLang].newFile);
        if (!name) return;
        if (rootHandle) {
            const handle = await rootHandle.getFileHandle(name, { create: true });
            await addFileToVFS(handle);
        } else {
            files[name] = { handle: null, name, content: '', type: 'file' };
            renderTree();
            openFile(name);
        }
    }

    // --- 描画 ---
    function renderTree() {
        const tree = document.getElementById('file-tree');
        tree.innerHTML = '';
        Object.keys(files).forEach(id => {
            const item = document.createElement('div');
            item.className = `tree-item ${activeFileId === id ? 'active' : ''} ${previewFileId === id ? 'preview-target' : ''}`;
            item.innerHTML = `<i class="fas fa-file-code"></i> ${id}`;
            
            // 右クリックでプレビュー対象を指定
            item.oncontextmenu = (e) => {
                e.preventDefault();
                if(id.endsWith('.html')) {
                    previewFileId = id;
                    alert(i18n[currentLang].setPreview + ": " + id);
                    renderTree();
                }
            };
            item.onclick = () => openFile(id);
            tree.appendChild(item);
        });
    }

    function openFile(id) {
        if (activeFileId) files[activeFileId].content = editor.getValue();
        activeFileId = id;
        editor.setValue(files[id].content, -1);
        editor.getSession().setMode(getMode(id));
        document.getElementById('tabs-container').innerHTML = `<div class="tab active">${id}</div>`;
        renderTree();
    }

    async function saveFile() {
        if (!activeFileId) return;
        const file = files[activeFileId];
        file.content = editor.getValue();
        if (file.handle) {
            const writable = await file.handle.createWritable();
            await writable.write(file.content);
            await writable.close();
        }
        localStorage.setItem('elite_vfs_backup', JSON.stringify(files)); // 簡易バックアップ
        alert("Saved!");
    }

    function getMode(n) {
        if(n.endsWith('.html')) return 'ace/mode/html';
        if(n.endsWith('.css')) return 'ace/mode/css';
        if(n.endsWith('.js')) return 'ace/mode/javascript';
        return 'ace/mode/text';
    }

    // --- ライブプレビューの魔法 ---
    function openLivePreview() {
        if (!previewFileId) {
            alert("プレビューするHTMLファイルがありません。");
            return;
        }
        files[activeFileId].content = editor.getValue();
        
        // 1. 起点となるHTMLを取得
        let html = files[previewFileId].content;

        // 2. 他のファイル（CSS/JS）を自動注入するロジック
        // <link href="style.css"> を <style>中身</style> に置換
        Object.keys(files).forEach(name => {
            if (name.endsWith('.css')) {
                const cssTag = new RegExp(`<link[^>]*href=["']${name}["'][^>]*>`, 'g');
                html = html.replace(cssTag, `<style>${files[name].content}</style>`);
            }
            if (name.endsWith('.js')) {
                const jsTag = new RegExp(`<script[^>]*src=["']${name}["'][^>]*><\/script>`, 'g');
                html = html.replace(jsTag, `<script>${files[name].content}<\/script>`);
            }
        });

        localStorage.setItem('elite_live_code', html);
        window.open('live-preview.html', 'LivePreview');
    }

    function switchLang(l) {
        currentLang = l;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = i18n[l][el.getAttribute('data-i18n')];
        });
    }
</script>
</body>
</html>
