<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Elite Code Editor Pro</title>
    <!--Ace Editorの読み込み-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <style>
        :root { --sidebar-bg: #1e1e1e; --toolbar-bg: #2d2d2d; --active-bg: #37373d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
        
        header { height: 45px; background: #333; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 12px; border-bottom: 1px solid #111; }
        .btn-live { background: #0078d4; color: white; border: none; padding: 6px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-live:hover { background: #0086ed; }

        #main { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 200px; background: var(--sidebar-bg); color: #888; display: flex; flex-direction: column; user-select: none; border-right: 1px solid #000; }
        .sidebar-header { padding: 10px 15px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #555; }
        .file-item { padding: 8px 15px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; color: #aaa; }
        .file-item.active { background: var(--active-bg); color: #fff; border-left: 2px solid #0078d4; }
        .file-item:hover:not(.active) { background: #2a2d2e; }

        /* Editor Area */
        #editor-pane { flex: 1; display: flex; flex-direction: column; }
        #ace-editor { flex: 1; font-size: 16px; } /* 文字サイズを大きく設定 */
        
        .tabs { height: 35px; background: #252526; display: flex; }
        .tab { background: var(--active-bg); color: #fff; padding: 0 20px; display: flex; align-items: center; font-size: 11px; font-border-right: 1px solid #1e1e1e; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <span style="font-weight:bold; letter-spacing:1px;">ELITE CODE EDITOR</span>
    </div>
    <button class="btn-live" onclick="openLivePreview()">
        <span>🌐 OPEN LIVE PREVIEW</span>
    </button>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header">Explorer</div>
        <div class="file-item active" onclick="switchFile('index.html')">📄 index.html</div>
        <div class="file-item" onclick="switchFile('style.css')">📄 style.css</div>
        <div class="file-item" onclick="switchFile('main.js')">📄 main.js</div>
    </div>

    <div id="editor-pane">
        <div class="tabs"><div class="tab" id="active-tab-name">index.html</div></div>
        <div id="ace-editor"></div>
    </div>
</div>

<script>
    // 仮想ファイル管理
    let files = {
        'index.html': { content: '<!-- HTML -->\n<div class="box">\n  <h1>Hello Ace!</h1>\n</div>', mode: 'ace/mode/html' },
        'style.css': { content: '/* CSS */\nbody { background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 90vh; }\n.box { background: white; padding: 50px; border: 3px solid black; }', mode: 'ace/mode/css' },
        'main.js': { content: '// JavaScript\nconsole.log("JavaScript Loaded.");', mode: 'ace/mode/javascript' }
    };

    let currentFile = 'index.html';

    // Ace Editorの初期化
    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai"); // 画像のような暗い背景
    editor.getSession().setMode(files[currentFile].mode);
    editor.setValue(files[currentFile].content, -1);
    editor.setOptions({
        fontFamily: "Consolas, 'Courier New', monospace",
        enableBasicAutocompletion: true,
        enableLiveAutocompletion: true
    });

    // ファイル切り替え機能
    function switchFile(filename) {
        // 現在の内容を保存
        files[currentFile].content = editor.getValue();
        
        currentFile = filename;
        document.getElementById('active-tab-name').innerText = filename;
        
        // サイドバーのアクティブ表示切り替え
        document.querySelectorAll('.file-item').forEach(el => {
            el.classList.toggle('active', el.innerText.includes(filename));
        });

        // エディタの設定更新
        editor.getSession().setMode(files[filename].mode);
        editor.setValue(files[filename].content, -1);
        
        updateLivePreviewData();
    }

    // 別ページで開くライブプレビュー
    let previewWindow = null;

    function openLivePreview() {
        // 別タブを開く
        const path = window.location.pathname.replace('code-editor.html', 'live-preview.html');
        previewWindow = window.open(path, 'LivePreview');
        updateLivePreviewData();
    }

    function updateLivePreviewData() {
        files[currentFile].content = editor.getValue();
        const fullCode = `
            ${files['index.html'].content}
            <style>${files['style.css'].content}</style>
            <script>${files['main.js'].content}<\/script>
        `;
        // LocalStorageを使って別タブにデータを送る（確実な方法）
        localStorage.setItem('elite_live_code', fullCode);
    }

    // 入力するたびにLocalStorageを更新
    editor.on('change', () => {
        updateLivePreviewData();
    });

</script>
</body>
</html>
