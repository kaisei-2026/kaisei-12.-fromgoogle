<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Elite IDE - Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #1e1e1e; --header-bg: #2d2d2d; --active-blue: #007acc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #1e1e1e; color: #fff; }
        header { height: 40px; background: var(--header-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 12px; border-bottom: 1px solid #111; }
        .btn { background: #3c3c3c; color: #ccc; border: none; padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn:hover { background: #505050; color: #fff; }
        .btn-primary { background: var(--active-blue); color: white; }
        #main { flex: 1; display: flex; overflow: hidden; }
        #sidebar { width: 250px; background: #252526; border-right: 1px solid #000; }
        .sidebar-header { padding: 10px 15px; font-size: 10px; font-weight: bold; color: #888; display: flex; justify-content: space-between; }
        #file-tree { flex: 1; overflow-y: auto; font-size: 13px; }
        .tree-item { padding: 4px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #aaa; }
        .tree-item.active { background: #37373d; color: #fff; }
        .tree-item.preview-target { border-right: 4px solid #e2c08d; color: #e2c08d; }
        #editor-pane { flex: 1; display: flex; flex-direction: column; }
        #ace-editor { flex: 1; font-size: 16px; font-weight: 700; }
    </style>
</head>
<body>
<header>
    <div style="font-weight:900; color:var(--active-blue);">ELITE WEB IDE</div>
    <div style="display:flex; gap:5px;">
        <button class="btn" onclick="openLocalFolder()">FOLDER</button>
        <button class="btn btn-primary" onclick="saveFile()">SAVE</button>
        <button class="btn btn-primary" style="background:#e2c08d; color:#000" onclick="openLivePreview()">LIVE</button>
    </div>
</header>
<div id="main">
    <div id="sidebar"><div class="sidebar-header">EXPLORER</div><div id="file-tree"></div></div>
    <div id="editor-pane"><div id="ace-editor"></div></div>
</div>
<script>
    let files = {'index.html': {content: '<h1>Hello</h1>', type: 'file'}};
    let activeId = 'index.html';
    let previewId = 'index.html';
    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");

    function renderTree() {
        const tree = document.getElementById('file-tree'); tree.innerHTML = '';
        Object.keys(files).forEach(id => {
            const el = document.createElement('div');
            el.className = `tree-item ${activeId === id ? 'active' : ''} ${previewId === id ? 'preview-target' : ''}`;
            el.innerHTML = `<i class="fas fa-file-code"></i> ${id}`;
            el.oncontextmenu = (e) => { e.preventDefault(); if(id.endsWith('.html')) previewId = id; renderTree(); };
            el.onclick = () => { files[activeId].content = editor.getValue(); activeId = id; editor.setValue(files[id].content, -1); renderTree(); };
            tree.appendChild(el);
        });
    }

    async function openLocalFolder() {
        const root = await window.showDirectoryPicker();
        files = {};
        for await (const entry of root.values()) {
            if (entry.kind === 'file') {
                const f = await entry.getFile();
                files[entry.name] = { content: await f.text(), handle: entry };
            }
        }
        activeId = Object.keys(files)[0]; renderTree();
    }

    async function saveFile() {
        const f = files[activeId]; f.content = editor.getValue();
        if(f.handle) { const w = await f.handle.createWritable(); await w.write(f.content); await w.close(); }
        alert("Saved!");
    }

    function openLivePreview() {
        localStorage.setItem('elite_live_code', editor.getValue());
        window.open('live-preview.html', 'LivePreview');
    }
    renderTree();
</script>
</body>
</html>
