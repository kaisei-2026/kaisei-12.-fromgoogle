<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web IDE - Local File System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #1e1e1e; --header-bg: #2d2d2d; --active-blue: #007acc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #1e1e1e; color: #fff; }
        header { height: 40px; background: var(--header-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 12px; border-bottom: 1px solid #111; }
        .btn { background: #3c3c3c; color: #ccc; border: none; padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn:hover { background: #505050; color: #fff; }
        .btn-primary { background: var(--active-blue); color: white; }
        #main { flex: 1; display: flex; overflow: hidden; }
        #sidebar { width: 250px; background: #252526; border-right: 1px solid #000; display: flex; flex-direction: column; }
        .sidebar-header { padding: 10px 15px; font-size: 10px; font-weight: bold; color: #888; display: flex; justify-content: space-between; }
        #file-tree { flex: 1; overflow-y: auto; font-size: 13px; }
        .tree-item { padding: 6px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #aaa; }
        .tree-item.active { background: #37373d; color: #fff; border-left: 3px solid var(--active-blue); }
        .tree-item.preview-target { color: #e2c08d; }
        #editor-pane { flex: 1; display: flex; flex-direction: column; }
        #ace-editor { flex: 1; font-size: 16px; font-weight: 700; }
    </style>
</head>
<body>
<header>
    <div style="font-weight:900; color:var(--active-blue);">ELITE WEB IDE</div>
    <div style="display:flex; gap:5px;">
        <button class="btn" onclick="openLocalFolder()"><i class="fas fa-folder-open"></i> <span id="lbl-open">フォルダを開く</span></button>
        <button class="btn" onclick="newLocalFile()"><i class="fas fa-plus"></i> <span id="lbl-new">新規ファイル</span></button>
        <button class="btn btn-primary" onclick="saveActiveFile()"><i class="fas fa-save"></i> <span id="lbl-save">保存(Ctrl+S)</span></button>
        <button class="btn btn-primary" style="background:#e2c08d; color:#000" onclick="openLivePreview()"><i class="fas fa-play"></i> LIVE</button>
    </div>
</header>
<div id="main">
    <div id="sidebar"><div class="sidebar-header"><span id="lbl-explorer">EXPLORER</span></div><div id="file-tree"></div></div>
    <div id="editor-pane"><div id="ace-editor"></div></div>
</div>
<script>
    const lang = localStorage.getItem('app_lang') || 'jp';
    if(lang === 'en') {
        document.getElementById('lbl-open').innerText = "Open Folder";
        document.getElementById('lbl-new').innerText = "New File";
        document.getElementById('lbl-save').innerText = "Save(Ctrl+S)";
    }

    let dirHandle = null;
    let files = {}; // 本物のファイルデータを格納
    let activeId = null;
    let previewId = null;
    
    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");

    // Ctrl+S で本物のファイルに上書き保存
    document.addEventListener('keydown', function(e) {
        if ((window.navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey) && e.key === 's') {
            e.preventDefault(); saveActiveFile();
        }
    });

    // 1. ローカルフォルダを開く
    async function openLocalFolder() {
        try {
            dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            files = {};
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    files[entry.name] = { handle: entry, content: await file.text() };
                    if (entry.name.endsWith('.html') && !previewId) previewId = entry.name;
                }
            }
            activeId = Object.keys(files)[0];
            if (activeId) {
                editor.setValue(files[activeId].content, -1);
                editor.getSession().setMode(getMode(activeId));
            }
            renderTree();
        } catch (err) { console.error(err); }
    }

    // 2. 実際のファイルとして保存
    async function saveActiveFile() {
        if (!activeId || !files[activeId]) return;
        const currentFile = files[activeId];
        currentFile.content = editor.getValue();
        
        if (currentFile.handle) {
            const writable = await currentFile.handle.createWritable();
            await writable.write(currentFile.content);
            await writable.close();
            
            const btn = document.querySelector('.btn-primary');
            const oldColor = btn.style.background;
            btn.style.background = '#28a745';
            setTimeout(() => btn.style.background = oldColor, 500);
        } else {
            alert(lang === 'jp' ? "フォルダが開かれていません。" : "Please open a folder first.");
        }
    }

    // 3. 実際のディレクトリ内に新規作成
    async function newLocalFile() {
        if (!dirHandle) {
            alert(lang === 'jp' ? "先に「フォルダを開く」から保存先のフォルダを選んでください。" : "Please open a folder first.");
            return;
        }
        const name = prompt(lang === 'jp' ? "ファイル名を入力 (例: index.html):" : "Filename (e.g. index.html):");
        if (name) {
            const newHandle = await dirHandle.getFileHandle(name, { create: true });
            files[name] = { handle: newHandle, content: '' };
            activeId = name;
            editor.setValue('', -1);
            editor.getSession().setMode(getMode(name));
            renderTree();
        }
    }

    function renderTree() {
        const tree = document.getElementById('file-tree'); tree.innerHTML = '';
        Object.keys(files).sort().forEach(id => {
            const el = document.createElement('div');
            el.className = `tree-item ${activeId === id ? 'active' : ''} ${previewId === id ? 'preview-target' : ''}`;
            el.innerHTML = `<i class="fas fa-file-code"></i> ${id}`;
            el.oncontextmenu = (e) => { e.preventDefault(); if(id.endsWith('.html')) { previewId = id; renderTree(); } };
            el.onclick = () => { 
                if (activeId) files[activeId].content = editor.getValue(); 
                activeId = id; 
                editor.setValue(files[id].content, -1); 
                editor.getSession().setMode(getMode(id)); 
                renderTree(); 
            };
            tree.appendChild(el);
        });
    }

    function getMode(n) {
        if(n.endsWith('.html')) return 'ace/mode/html';
        if(n.endsWith('.css')) return 'ace/mode/css';
        if(n.endsWith('.js')) return 'ace/mode/javascript';
        return 'ace/mode/text';
    }

    function openLivePreview() {
        if (activeId) files[activeId].content = editor.getValue();
        if (!previewId || !files[previewId]) return alert("HTMLがありません");
        
        let html = files[previewId].content;
        Object.keys(files).forEach(name => {
            if (name.endsWith('.css')) html = html.replace(new RegExp(`<link[^>]*href=["']${name}["'][^>]*>`, 'g'), `<style>${files[name].content}</style>`);
            if (name.endsWith('.js')) html = html.replace(new RegExp(`<script[^>]*src=["']${name}["'][^>]*><\\/script>`, 'g'), `<script>${files[name].content}<\\/script>`);
        });
        localStorage.setItem('elite_live_code', html);
        window.open('live-preview.html', 'LivePreview');
    }
</script>
</body>
</html>
