<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Python Professional IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --header-bg: #212121; --sidebar-bg: #181818; --term-bg: #000; --active-blue: #0078d4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
        
        header { height: 45px; background: var(--header-bg); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .toolbar { display: flex; gap: 8px; align-items: center; }
        .btn { background: #444; color: white; border: none; padding: 6px 15px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .btn-run { background: #28a745; border: 1px solid #1e7e34; }
        .btn-run:hover { background: #218838; }
        .lang-select { background: #333; color: #fff; border: 1px solid #555; padding: 2px 5px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        #main { flex: 1; display: flex; overflow: hidden; }
        #sidebar { width: 220px; background: var(--sidebar-bg); color: #888; display: flex; flex-direction: column; border-right: 1px solid #000; }
        .sidebar-header { padding: 12px 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #555; display: flex; justify-content: space-between; }
        .file-item { padding: 6px 15px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; color: #aaa; }
        .file-item.active { background: #37373d; color: #fff; border-left: 3px solid var(--active-blue); }

        #editor-pane { flex: 1; display: flex; flex-direction: column; }
        #ace-editor { flex: 1; font-size: 16px; font-weight: 700; }

        #terminal { height: 250px; background: var(--term-bg); border-top: 2px solid #444; display: flex; flex-direction: column; }
        .term-header { background: #2d2d2d; padding: 5px 15px; font-size: 10px; font-weight: bold; color: #aaa; display: flex; justify-content: space-between; }
        #output { flex: 1; overflow-y: auto; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; color: #fff; line-height: 1.5; white-space: pre-wrap; font-weight: bold; }
        .text-error { color: #ff5555; }
        .text-system { color: #55aaff; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <span style="font-weight:bold; letter-spacing:1px;">PYTHON ELITE IDE</span>
        <select class="lang-select" id="lang-toggle" onchange="switchLang(this.value)">
            <option value="jp">日本語</option>
            <option value="en">English</option>
        </select>
    </div>
    <div class="toolbar">
        <button class="btn" id="btn-folder" onclick="openFolder()"><i class="fas fa-folder-open"></i> フォルダを開く</button>
        <button class="btn" id="btn-save" onclick="saveFile()"><i class="fas fa-save"></i> 保存</button>
        <button class="btn btn-run" id="btn-run" onclick="runPython()"><i class="fas fa-play"></i> 実行</button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header"><span id="lbl-explorer">エクスプローラー</span> <i class="fas fa-file-plus" onclick="newFile()"></i></div>
        <div id="file-tree"></div>
    </div>
    <div id="editor-pane">
        <div id="ace-editor"></div>
        <div id="terminal">
            <div class="term-header">
                <span id="lbl-terminal">ターミナル出力</span>
                <span style="cursor:pointer" onclick="clearTerminal()">CLEAR</span>
            </div>
            <div id="output">Python エンジンを起動中...</div>
        </div>
    </div>
</div>

<script>
    const i18n = {
        jp: { folder: "フォルダを開く", save: "保存", run: "実行", explorer: "エクスプローラー", terminal: "ターミナル出力", ready: "Python 3.11 準備完了。" },
        en: { folder: "Open Folder", save: "Save", run: "Run Script", explorer: "Explorer", terminal: "Terminal Output", ready: "Python 3.11 Ready." }
    };

    let files = {'main.py': { content: '', handle: null }};
    let activeFile = 'main.py';
    let pyodide = null;

    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");
    editor.getSession().setMode("ace/mode/python");

    async function init() {
        pyodide = await loadPyodide();
        // 修正ポイント：inputをJSのpromptに置き換える
        pyodide.runPython(`
            import js
            def input(p=""):
                return js.prompt(p)
            __builtins__.input = input
        `);
        document.getElementById('output').innerHTML = `<span class="text-system">${i18n.jp.ready}</span>\n`;
    }
    init();

    function clearTerminal() { document.getElementById('output').innerHTML = ''; }

    function log(msg, isError = false) {
        const div = document.createElement('div');
        if (isError) div.className = 'text-error';
        div.textContent = msg;
        const out = document.getElementById('output');
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    async function runPython() {
        if (!pyodide) return alert("Python is loading...");
        log(`\n> ${activeFile} を実行中...`, false);
        
        try {
            pyodide.setStdout({ batched: (msg) => log(msg) });
            pyodide.setStderr({ batched: (msg) => log(msg, true) });
            
            // 修正ポイント：IPythonのエラーを避けるためコードを掃除
            let code = editor.getValue();
            code = code.replace(/from IPython\.display import clear_output/g, "");
            code = code.replace(/clear_output\(wait=True\)/g, "");

            await pyodide.runPythonAsync(code);
        } catch (err) {
            log(err.message, true);
        }
    }

    function switchLang(lang) {
        document.getElementById('btn-folder').innerHTML = `<i class="fas fa-folder-open"></i> ${i18n[lang].folder}`;
        document.getElementById('btn-save').innerHTML = `<i class="fas fa-save"></i> ${i18n[lang].save}`;
        document.getElementById('btn-run').innerHTML = `<i class="fas fa-play"></i> ${i18n[lang].run}`;
        document.getElementById('lbl-explorer').innerText = i18n[lang].explorer;
        document.getElementById('lbl-terminal').innerText = i18n[lang].terminal;
    }

    // --- ファイル操作関数 (省略せず実装) ---
    function renderTree() {
        const tree = document.getElementById('file-tree');
        tree.innerHTML = '';
        Object.keys(files).forEach(name => {
            const div = document.createElement('div');
            div.className = `file-item ${activeFile === name ? 'active' : ''}`;
            div.innerHTML = `<i class="fab fa-python" style="color:#ffd43b"></i> ${name}`;
            div.onclick = () => {
                files[activeFile].content = editor.getValue();
                activeFile = name;
                editor.setValue(files[name].content, -1);
                renderTree();
            };
            tree.appendChild(div);
        });
    }

    async function openFolder() {
        try {
            const handle = await window.showDirectoryPicker();
            files = {};
            for await (const entry of handle.values()) {
                if (entry.kind === 'file' && entry.name.endsWith('.py')) {
                    const file = await entry.getFile();
                    files[entry.name] = { content: await file.text(), handle: entry };
                }
            }
            activeFile = Object.keys(files)[0] || 'main.py';
            editor.setValue(files[activeFile].content, -1);
            renderTree();
        } catch(e) {}
    }

    async function saveFile() {
        const file = files[activeFile];
        file.content = editor.getValue();
        if (file.handle) {
            const writable = await file.handle.createWritable();
            await writable.write(file.content);
            await writable.close();
            log("ディスクに保存しました。");
        } else { log("仮想保存完了（フォルダを開くとディスクに保存できます）"); }
    }

    function newFile() {
        const name = prompt("ファイル名 (.py):");
        if (name) {
            files[name] = { content: '', handle: null };
            activeFile = name;
            editor.setValue('', -1);
            renderTree();
        }
    }

    renderTree();
    // 初期コードとしてあなたの課題管理アプリをセット
    editor.setValue(`import csv\nimport os\nfrom datetime import datetime\n\n# 課題管理アプリ...\nprint("アプリを起動しました")`, -1);
</script>
</body>
</html>
