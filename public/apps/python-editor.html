<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Python Professional IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-main: #1e1e1e; --bg-side: #252526; --bg-term: #000; --text: #d4d4d4; --accent: #28a745; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Consolas', 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-main); color: var(--text); }
        header { height: 48px; background: #333; border-bottom: 1px solid #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .toolbar { display: flex; gap: 8px; align-items: center; }
        .btn { background: #444; color: #fff; border: 1px solid #555; padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .btn:hover { background: #555; }
        .btn-run { background: var(--accent) !important; border: none; }
        #main { flex: 1; display: flex; overflow: hidden; }
        #sidebar { width: 220px; background: var(--bg-side); border-right: 1px solid #111; display: flex; flex-direction: column; }
        .sidebar-header { padding: 12px 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #666; display: flex; justify-content: space-between; }
        #file-tree { flex: 1; overflow-y: auto; font-size: 13px; }
        .tree-item { padding: 4px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #aaa; padding-left: 20px;}
        .tree-item.active { background: #37373d; color: #fff; border-left: 2px solid var(--accent); padding-left: 18px; }
        .folder-title { padding: 4px 10px; font-weight: bold; color: #ccc; background: #2d2d2d; margin-top: 5px; font-size: 11px;}
        #editor-pane { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        #ace-editor { flex: 1; font-size: 16px; }
        #terminal { height: 240px; background: var(--bg-term); border-top: 3px solid var(--border); display: flex; flex-direction: column; }
        .term-header { background: #2d2d2d; padding: 6px 15px; font-size: 10px; font-weight: bold; color: #888; display: flex; justify-content: space-between; }
        #output { flex: 1; overflow-y: auto; padding: 15px; font-family: 'Fira Code', 'Consolas', monospace; font-size: 14px; color: #0f0; line-height: 1.6; white-space: pre-wrap; }
    </style>
</head>
<body>
<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <span style="font-weight:900; color:var(--accent);">ELITE PY IDE</span>
    </div>
    <div class="toolbar">
        <button class="btn" onclick="newFile()"><i class="fas fa-plus"></i> <span id="lbl-new">新規作成</span></button>
        <button class="btn" onclick="saveState()"><i class="fas fa-save"></i> <span id="lbl-save">保存(Ctrl+S)</span></button>
        <button class="btn btn-run" onclick="runPython()"><i class="fas fa-play"></i> <span id="lbl-run">実行</span></button>
    </div>
</header>
<div id="main">
    <div id="sidebar"><div class="sidebar-header"><span id="lbl-explorer">エクスプローラー</span></div><div id="file-tree"></div></div>
    <div id="editor-pane"><div id="ace-editor"></div><div id="terminal"><div class="term-header"><span id="lbl-terminal">ターミナル</span><span style="cursor:pointer" onclick="clearTerminal()">CLEAR</span></div><div id="output">Initializing...</div></div></div>
</div>

<script>
    const lang = localStorage.getItem('app_lang') || 'jp';
    if(lang === 'en') {
        document.getElementById('lbl-new').innerText = "New File";
        document.getElementById('lbl-save').innerText = "Save(Ctrl+S)";
        document.getElementById('lbl-run').innerText = "Run";
        document.getElementById('lbl-explorer').innerText = "Explorer";
        document.getElementById('lbl-terminal').innerText = "Terminal";
    }

    // 状態復元
    let files = JSON.parse(localStorage.getItem('py_ide_files')) || {'main.py': {content: 'print("Hello Python!")'}};
    let activeFile = localStorage.getItem('py_ide_active') || 'main.py';
    if(!files[activeFile]) activeFile = Object.keys(files)[0];

    let pyodide = null;
    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");
    editor.getSession().setMode("ace/mode/python");

    document.addEventListener('keydown', function(e) {
        if ((window.navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey) && e.key === 's') {
            e.preventDefault(); saveState();
        }
    });

    function saveState() {
        files[activeFile].content = editor.getValue();
        localStorage.setItem('py_ide_files', JSON.stringify(files));
        localStorage.setItem('py_ide_active', activeFile);
        const btn = document.querySelector('.btn'); // Save button
        const oldColor = btn.style.background;
        btn.style.background = '#28a745';
        setTimeout(() => btn.style.background = oldColor, 500);
    }

    async function init() {
        pyodide = await loadPyodide();
        await pyodide.runPythonAsync(`
import js, sys
from types import ModuleType
def custom_input(p=""): return js.prompt(p)
__builtins__.input = custom_input
ipython = ModuleType("IPython")
display = ModuleType("display")
def clear_output(wait=False): js.document.getElementById('output').innerHTML = ""
display.clear_output = clear_output
ipython.display = display
sys.modules["IPython"] = ipython
sys.modules["IPython.display"] = display
        `);
        document.getElementById('output').innerHTML = lang === 'jp' ? "Python準備完了。" : "Python Ready.";
    }
    init();

    function clearTerminal() { document.getElementById('output').innerHTML = ''; }
    function log(msg, isError = false) {
        const out = document.getElementById('output');
        const span = document.createElement('span');
        if (isError) span.style.color = '#ff5555';
        span.textContent = msg + "\n";
        out.appendChild(span);
        out.scrollTop = out.scrollHeight;
    }

    async function runPython() {
        if (!pyodide) return;
        saveState();
        if (activeFile.endsWith('.ipy') || activeFile.endsWith('.ipynb')) clearTerminal();
        try {
            pyodide.setStdout({ batched: (msg) => log(msg) });
            pyodide.setStderr({ batched: (msg) => log(msg, true) });
            await pyodide.runPythonAsync(editor.getValue());
        } catch (err) { log(err.message, true); }
    }

    function renderTree() {
        const tree = document.getElementById('file-tree'); tree.innerHTML = '';
        const sortedIds = Object.keys(files).sort();
        let currentFolder = '';

        sortedIds.forEach(id => {
            const parts = id.split('/');
            const filename = parts.pop();
            const folder = parts.join('/');

            if (folder && folder !== currentFolder) {
                const fEl = document.createElement('div');
                fEl.className = 'folder-title';
                fEl.innerHTML = `<i class="fas fa-folder-open"></i> ${folder}`;
                tree.appendChild(fEl);
                currentFolder = folder;
            }

            const el = document.createElement('div');
            el.className = `tree-item ${activeFile === id ? 'active' : ''}`;
            const icon = id.endsWith('.ipy') ? 'fa-book' : 'fa-python';
            el.innerHTML = `<i class="fab ${icon}" style="color:#ffd43b"></i> ${filename}`;
            el.onclick = () => { files[activeFile].content = editor.getValue(); activeFile = id; editor.setValue(files[id].content, -1); saveState(); renderTree(); };
            tree.appendChild(el);
        });
    }

    function newFile() {
        const name = prompt(lang === 'jp' ? "ファイル名 (例: utils/script.py):" : "Filename (e.g. utils/script.py):");
        if(name) { files[name] = {content: ''}; activeFile = name; editor.setValue('', -1); saveState(); renderTree(); }
    }

    editor.setValue(files[activeFile].content, -1);
    renderTree();
</script>
</body>
</html>
