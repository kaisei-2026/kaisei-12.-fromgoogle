<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Professional Python IDE</title>
    <!-- ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #1e1e1e; --bg-side: #252526; --bg-term: #000;
            --text: #d4d4d4; --accent: #007acc; --border: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Consolas', 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-main); color: var(--text); }
        
        /* Header */
        header { height: 48px; background: #333; border-bottom: 1px solid #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .toolbar { display: flex; gap: 8px; align-items: center; }
        .btn { background: #444; color: #fff; border: 1px solid #555; padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn:hover { background: #555; }
        .btn-run { background: #28a745 !important; border: none; }
        .mode-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; }
        .lang-select { background: #252526; color: #fff; border: 1px solid #444; padding: 3px; border-radius: 4px; font-size: 10px; }

        #main { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 220px; background: var(--bg-side); border-right: 1px solid #111; display: flex; flex-direction: column; user-select: none; }
        .sidebar-header { padding: 12px 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #666; display: flex; justify-content: space-between; }
        .file-item { padding: 8px 15px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 10px; color: #999; }
        .file-item.active { background: #37373d; color: #fff; }

        /* Editor */
        #editor-pane { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        #ace-editor { flex: 1; font-size: 16px; }

        /* Terminal */
        #terminal { height: 240px; background: var(--bg-term); border-top: 3px solid var(--border); display: flex; flex-direction: column; }
        .term-header { background: #2d2d2d; padding: 6px 15px; font-size: 10px; font-weight: bold; color: #888; display: flex; justify-content: space-between; }
        #output { flex: 1; overflow-y: auto; padding: 15px; font-family: 'Fira Code', 'Consolas', monospace; font-size: 14px; color: #0f0; line-height: 1.6; white-space: pre-wrap; }
        .text-error { color: #ff5555; }
        .text-info { color: #55aaff; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <span style="font-weight:900; color:var(--accent);">ELITE PY IDE</span>
        <span id="current-mode-badge" class="mode-badge">STANDARD</span>
        <select class="lang-select" id="lang-toggle" onchange="switchLang(this.value)">
            <option value="jp">日本語</option>
            <option value="en">English</option>
        </select>
    </div>
    <div class="toolbar">
        <button class="btn" id="btn-folder" onclick="openFolder()"><i class="fas fa-folder-open"></i> <span>フォルダを開く</span></button>
        <button class="btn" id="btn-save" onclick="saveFile()"><i class="fas fa-save"></i> <span>保存</span></button>
        <button class="btn btn-run" id="btn-run" onclick="runPython()"><i class="fas fa-play"></i> <span>実行</span></button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header"><span id="lbl-explorer">エクスプローラー</span> <i class="fas fa-plus" onclick="newFile()"></i></div>
        <div id="file-tree"></div>
    </div>
    <div id="editor-pane">
        <div id="ace-editor"></div>
        <div id="terminal">
            <div class="term-header">
                <span id="lbl-terminal">ターミナル / コンソール</span>
                <span style="cursor:pointer" onclick="clearTerminal()">CLEAR</span>
            </div>
            <div id="output">Initializing Engine...</div>
        </div>
    </div>
</div>

<script>
    const i18n = {
        jp: { folder: "フォルダを開く", save: "保存", run: "実行", explorer: "エクスプローラー", terminal: "ターミナル / コンソール", ready: "Python準備完了。出力はここに出ます。" },
        en: { folder: "Open Folder", save: "Save", run: "Run", explorer: "Explorer", terminal: "Terminal / Console", ready: "Python Ready. Output will appear here." }
    };

    let files = {
        'script.py': { content: 'print("--- Standard Mode ---")\nname = input("名前は？")\nprint(f"Hello {name}!")', type: 'standard' },
        'app.ipynb': { content: 'from IPython.display import clear_output\nimport time\n\nprint("3秒後にクリアします...")\ntime.sleep(3)\nclear_output()\nprint("クリア成功！これがJupyterモードです。")', type: 'jupyter' }
    };
    let activeFile = 'script.py';
    let pyodide = null;
    let currentLang = 'jp';

    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");
    editor.getSession().setMode("ace/mode/python");

    async function init() {
        pyodide = await loadPyodide();
        // Python環境の初期化
        await pyodide.runPythonAsync(`
import js, sys
from types import ModuleType

# 1. input() を JSのpromptに接続
def custom_input(p=""):
    return js.prompt(p)
__builtins__.input = custom_input

# 2. IPythonのモックを作成
ipython = ModuleType("IPython")
display = ModuleType("display")
def clear_output(wait=False):
    js.document.getElementById('output').innerHTML = ""

display.clear_output = clear_output
ipython.display = display
sys.modules["IPython"] = ipython
sys.modules["IPython.display"] = display
        `);
        document.getElementById('output').innerHTML = i18n[currentLang].ready;
    }
    init();

    function clearTerminal() { document.getElementById('output').innerHTML = ''; }

    function log(msg, isError = false) {
        const out = document.getElementById('output');
        const span = document.createElement('span');
        if (isError) span.className = 'text-error';
        span.textContent = msg + "\n";
        out.appendChild(span);
        out.scrollTop = out.scrollHeight;
    }

    async function runPython() {
        if (!pyodide) return;
        const code = editor.getValue();
        // エラー防止：実行前に出力をクリア（Jupyterモード風）
        if (activeFile.endsWith('.ipynb')) clearTerminal();
        
        try {
            pyodide.setStdout({ batched: (msg) => log(msg) });
            pyodide.setStderr({ batched: (msg) => log(msg, true) });
            await pyodide.runPythonAsync(code);
        } catch (err) {
            log(err.message, true);
        }
    }

    function renderTree() {
        const tree = document.getElementById('file-tree');
        tree.innerHTML = '';
        Object.keys(files).forEach(name => {
            const div = document.createElement('div');
            div.className = `file-item ${activeFile === name ? 'active' : ''}`;
            const isJupyter = name.endsWith('.ipynb');
            div.innerHTML = `<i class="fas ${isJupyter ? 'fa-book' : 'fa-code'}" style="color:${isJupyter ? '#007acc' : '#ffd43b'}"></i> ${name}`;
            div.onclick = () => {
                files[activeFile].content = editor.getValue();
                activeFile = name;
                editor.setValue(files[name].content, -1);
                document.getElementById('current-mode-badge').innerText = isJupyter ? 'JUPYTER' : 'STANDARD';
                document.getElementById('current-mode-badge').style.background = isJupyter ? '#e67e22' : '#007acc';
                renderTree();
            };
            tree.appendChild(div);
        });
    }

    function switchLang(lang) {
        currentLang = lang;
        document.getElementById('btn-folder').querySelector('span').innerText = i18n[lang].folder;
        document.getElementById('btn-save').querySelector('span').innerText = i18n[lang].save;
        document.getElementById('btn-run').querySelector('span').innerText = i18n[lang].run;
        document.getElementById('lbl-explorer').innerText = i18n[lang].explorer;
        document.getElementById('lbl-terminal').innerText = i18n[lang].terminal;
    }

    async function openFolder() {
        try {
            const handle = await window.showDirectoryPicker();
            files = {};
            for await (const entry of handle.values()) {
                if (entry.kind === 'file' && (entry.name.endsWith('.py') || entry.name.endsWith('.ipynb'))) {
                    const file = await entry.getFile();
                    files[entry.name] = { content: await file.text() };
                }
            }
            activeFile = Object.keys(files)[0];
            editor.setValue(files[activeFile].content, -1);
            renderTree();
        } catch(e){}
    }

    async function saveFile() {
        alert("Saved to Browser Memory. (Use Open Folder for local sync)");
    }

    function newFile() {
        const name = prompt("ファイル名 (.py or .ipynb):");
        if(name) { files[name] = { content: '' }; activeFile = name; renderTree(); editor.setValue('', -1); }
    }

    renderTree();
</script>
</body>
</html>
