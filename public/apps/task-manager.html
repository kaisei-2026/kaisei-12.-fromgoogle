<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Task Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --border: #dadce0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f8f9fa; color: #202124; padding: 10px; }
        
        /* レスポンシブレイアウト */
        .layout { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: row; gap: 15px; }
        @media (max-width: 900px) { .layout { flex-direction: column; } .sidebar { width: 100% !important; position: static !important; } }

        .sidebar { width: 300px; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 10px; }
        .calendar-container { flex: 1; background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; min-width: 350px; }
        
        input, select { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* カレンダー描画 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        .day-label { padding: 10px; text-align: center; font-size: 11px; font-weight: bold; background: #f1f3f4; border: 0.1px solid #eee; }
        .day-cell { min-height: 100px; border: 0.1px solid #eee; padding: 4px; position: relative; }
        .day-cell.drag-over { background: #e8f0fe; border: 2px dashed var(--primary); }
        .day-num { font-size: 11px; font-weight: bold; }

        /* タスクバー（ドラッグ可能） */
        .task-bar { font-size: 10px; padding: 3px 6px; border-radius: 4px; margin-bottom: 2px; color: white; cursor: grab; display: flex; justify-content: space-between; align-items: center; }
        .task-bar:active { cursor: grabbing; opacity: 0.5; }
        
        /* 科目カラー */
        .bg-math { background: #ea4335; } .bg-english { background: #4285f4; } .bg-gengoku { background: #f06292; } 
        .bg-genbun { background: #ba68c8; } .bg-kasei { background: #34a853; } .bg-butsuchi { background: #81c784; }
        .bg-koukyo { background: #fbbc04; } .bg-chisou { background: #ff8f00; } .bg-info { background: #00acc1; } 
        .bg-art { background: #7986cb; } .bg-health { background: #00897b; } .bg-home { background: #a1887f; } .bg-other { background: #90a4ae; }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <h3 style="font-size:16px; margin-bottom:15px; color:var(--primary)">課題を登録</h3>
        <label style="font-size:11px">課題名</label>
        <input type="text" id="taskName" placeholder="例: 数学課題">
        <label style="font-size:11px">期限日 (カレンダーから選択可)</label>
        <input type="date" id="taskDate">
        <label style="font-size:11px">科目</label>
        <select id="taskSubject">
            <option value="math">数学</option><option value="english">英語</option><option value="gengoku">現国</option>
            <option value="genbun">言文</option><option value="kasei">化生</option><option value="butsuchi">物地</option>
            <option value="koukyo">公共</option><option value="chisou">地総</option><option value="info">情報</option>
            <option value="health">保健体育</option><option value="art">芸術</option><option value="home">家庭科</option><option value="other">その他</option>
        </select>
        <div style="background:#f1f3f4; padding:10px; border-radius:8px;">
            <label style="font-size:11px">繰り返し登録</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="repCount" value="1" min="1" placeholder="回数">
                <input type="number" id="repDay" value="7" min="1" placeholder="日おき">
            </div>
        </div>
        <button class="btn-add" style="margin-top:10px" onclick="addTask()">登録</button>
        <p style="font-size:10px; color:#888; margin-top:15px;">※タスクをドラッグして日付を変更できます。</p>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer"><i class="fas fa-chevron-left"></i></button>
            <h2 id="monthLabel" style="font-size:18px"></h2>
            <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="calendar-grid" id="grid"></div>
    </div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('kaisei_tasks_v4')) || [];
    let viewDate = new Date();

    function save() { localStorage.setItem('kaisei_tasks_v4', JSON.stringify(tasks)); render(); }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const sub = document.getElementById('taskSubject').value;
        const count = parseInt(document.getElementById('repCount').value);
        const interval = parseInt(document.getElementById('repDay').value);
        if(!name || !date) return alert("入力してください");

        for(let i=0; i<count; i++) {
            let d = new Date(date);
            d.setDate(d.getDate() + (i * interval));
            tasks.push({ id: Date.now()+i, name: count>1?`${name}(${i+1}/${count})`:name, date: d.toISOString().split('T')[0], sub });
        }
        save();
    }

    function deleteTask(id) { if(confirm("削除しますか？")) { tasks = tasks.filter(t => t.id !== id); save(); } }

    // ドラッグ＆ドロップ機能
    function onDragStart(ev, id) { ev.dataTransfer.setData("taskId", id); }
    function onDragOver(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
    function onDragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }
    function onDrop(ev, newDate) {
        ev.preventDefault();
        ev.currentTarget.classList.remove('drag-over');
        const id = ev.dataTransfer.getData("taskId");
        const task = tasks.find(t => t.id == id);
        if(task) { task.date = newDate; save(); }
    }

    function changeMonth(diff) { viewDate.setMonth(viewDate.getMonth() + diff); render(); }

    function render() {
        const grid = document.getElementById('grid');
        const monthLabel = document.getElementById('monthLabel');
        grid.innerHTML = '';
        ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="day-label">${d}</div>`);

        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        monthLabel.innerText = `${year}年 ${month + 1}月`;

        const first = new Date(year, month, 1).getDay();
        const last = new Date(year, month + 1, 0).getDate();

        for(let i=0; i<first; i++) grid.innerHTML += `<div class="day-cell" style="background:#fafafa"></div>`;

        for(let d=1; d<=last; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toISOString().split('T')[0] === dateStr;
            let html = `<div class="day-cell ${isToday?'today':''}" 
                        onclick="document.getElementById('taskDate').value='${dateStr}'"
                        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, '${dateStr}')">
                        <span class="day-num">${d}</span>`;
            
            tasks.filter(t => t.date === dateStr).forEach(t => {
                html += `<div class="task-bar bg-${t.sub}" draggable="true" ondragstart="onDragStart(event, ${t.id})">
                         <span>${t.name}</span><i class="fas fa-times" onclick="event.stopPropagation();deleteTask(${t.id})"></i>
                         </div>`;
            });
            grid.innerHTML += html + `</div>`;
        }
    }
    render();
</script>
</body>
</html>
