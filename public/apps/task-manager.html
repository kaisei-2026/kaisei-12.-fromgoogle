<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaisei Task Manager - Stable Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --border: #dadce0; --today-bg: #fff9c4; --selected-bg: #e8f0fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #f8f9fa; color: #202124; padding: 10px; font-size: 14px; overflow-x: hidden; transition: background 0.3s; }
        body.dark-mode { background: #0a0a0a; color: #e0e0e0; --border: #27272a; --today-bg: #423b00; }
        .wrapper { width: 100%; margin: 0; }
        
        .auth-notice { background: #ffffff; border: 2px solid var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.1); }
        body.dark-mode .auth-notice { background: #18181b; border-color: #333; }
        .auth-notice h3 { font-size: 13px; color: var(--primary); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
        .auth-notice p { font-size: 11px; color: #5f6368; line-height: 1.5; }

        .team-tabs { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .team-tab { padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: 0.2s; }
        body.dark-mode .team-tab { background: #1e1e1e; color: #aaa; border-color: #333; }
        .team-tab.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(26,115,232,0.3); }

        .layout { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        @media (min-width: 1000px) { .layout { flex-direction: row; align-items: flex-start; } .sidebar { width: 320px !important; position: sticky; top: 5px; } }
        .sidebar { width: 100%; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        body.dark-mode .sidebar { background: #18181b; }
        h2 { font-size: 14px; margin-bottom: 10px; color: var(--primary); font-weight: 800; }
        label { font-size: 10px; font-weight: bold; color: #5f6368; margin-top: 8px; display: block; }
        input, select { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; background: #fff; }
        body.dark-mode input, body.dark-mode select { background: #2d2d2d; color: #fff; border-color: #444; }

        .mode-switch { background: #f1f3f4; padding: 10px; border-radius: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 12px; font-weight: bold; }
        .mode-switch.active { background: var(--selected-bg); color: var(--primary); border: 1px solid var(--primary); }

        .btn-main { width: 100%; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .btn-add { background: var(--primary); }
        .btn-google { background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; height: 50px; }

        .calendar-container { flex: 1; background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; width: 100%; }
        body.dark-mode .calendar-container { background: #18181b; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        .cal-label { padding: 10px 0; text-align: center; font-size: 11px; font-weight: bold; color: #70757a; background: #f8f9fa; border-bottom: 1px solid var(--border); }
        body.dark-mode .cal-label { background: #1e1e1e; }
        .cal-cell { min-height: 110px; border: 0.1px solid #f1f3f4; padding: 3px; position: relative; cursor: pointer; }
        .cal-cell.today { background: var(--today-bg) !important; }
        .cal-cell.selected { border: 2.5px solid var(--primary) !important; background: var(--selected-bg); z-index: 2; }
        .day-num { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: #3c4043; }
        body.dark-mode .day-num { color: #ccc; }
        
        .task-bar { font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: grab; }
        .task-bar span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .bg-math { background: #ea4335; } .bg-english { background: #4285f4; } .bg-gengoku { background: #f06292; } 
        .bg-genbun { background: #ba68c8; } .bg-kasei { background: #34a853; } .bg-butsuchi { background: #81c784; }
        .bg-koukyo { background: #fbbc04; } .bg-chisou { background: #ff8f00; } .bg-info { background: #00acc1; } 
        .bg-health { background: #00897b; } .bg-art { background: #7986cb; } .bg-home { background: #a1887f; } .bg-other { background: #90a4ae; }
        
        #user-profile { display: none; align-items: center; justify-content: space-between; padding: 10px; background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; }
        body.dark-mode #user-profile { background: #2d2d2d; }
        #user-info { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: bold; }
        #user-info img { width: 24px; height: 24px; border-radius: 50%; }

        .filter-section { border-top: 1px solid #eee; margin-top: 15px; padding-top: 10px; }
        .filter-grid { display: flex; flex-wrap: wrap; gap: 4px; }
        .filter-chip { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 10px; background: #fff; cursor: pointer; font-weight: bold; }
        body.dark-mode .filter-chip { background: #2d2d2d; color: #aaa; border-color: #444; }
        .filter-chip.active { background: var(--selected-bg); color: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="auth-section">
        <div class="auth-notice" id="login-notice">
            <h3><i class="fas fa-graduation-cap"></i> 札幌開成 ログイン</h3>
            <p>学校のアカウント（<strong>@gll-kaisei-s.sapporo-c.ed.jpなど</strong>）でログインすると、チーム全員で課題を共有できます。</p>
        </div>
        <button id="btn-login" class="btn-main btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Googleログイン
        </button>
        <div id="user-profile">
            <div id="user-info"></div>
            <button onclick="logout()" style="background:none; border:none; color:#f28b82; font-size:11px; cursor:pointer; font-weight:bold;">ログアウト</button>
        </div>
    </div>

    <div class="team-tabs" id="teamTabs"></div>

    <div class="layout">
        <div class="sidebar">
            <h2><i class="fas fa-plus-circle"></i> 課題登録</h2>
            <input type="text" id="taskName" placeholder="タイトルを入力">
            <label>科目</label>
            <select id="taskSubject">
                <option value="math">数学</option><option value="english">英語</option><option value="gengoku">現国</option>
                <option value="genbun">言文</option><option value="kasei">化生</option><option value="butsuchi">物地</option>
                <option value="koukyo">公共</option><option value="chisou">地総</option><option value="info">情報</option>
                <option value="health">保健体育</option><option value="art">芸術</option><option value="home">家庭科</option><option value="other">その他</option>
            </select>

            <div class="mode-switch" id="modeSwitch" onclick="toggleMultiMode()">
                <span>複数日を選択する</span>
                <i class="fas fa-check-double" id="toggleIcon" style="color:#ccc;"></i>
            </div>

            <div id="singleAction">
                <label>締切日 (カレンダーから選択可)</label>
                <input type="date" id="taskDate">
                <button class="btn-main btn-add" onclick="addSingleTask()">クラウドに保存</button>
            </div>

            <div id="multiAction" style="display: none;">
                <p id="selectedCount" style="font-size:11px; text-align:center; color:var(--primary); font-weight:bold; margin-bottom:5px;">0日選択中</p>
                <button class="btn-main" style="background:#1e8e3e" id="confirmBtn" disabled onclick="addMultiTasks()">選択した日で確定</button>
            </div>

            <div class="filter-section">
                <label>表示フィルター</label>
                <div class="filter-grid" id="filterGrid">
                    <div class="filter-chip active" id="filter-all" style="width:100%; margin-bottom:5px;" onclick="setFilter('all')">すべて表示</div>
                </div>
            </div>
        </div>

        <div class="calendar-container">
            <div class="cal-header">
                <button onclick="changeMonth(-1)" style="border:none; background:none; padding:10px; cursor:pointer;"><i class="fas fa-chevron-left" style="color:#888;"></i></button>
                <h2 id="monthLabel" style="font-size: 16px; font-weight: 800; color:var(--text);"></h2>
                <button onclick="changeMonth(1)" style="border:none; background:none; padding:10px; cursor:pointer;"><i class="fas fa-chevron-right" style="color:#888;"></i></button>
            </div>
            <div class="cal-grid" id="grid"></div>
        </div>
    </div>
</div>

<script>
    // 🌟 --- Supabase設定 --- 🌟
    const SUPABASE_URL = 'https://ahovehkshnnlipcssilm.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_aoTV062URNq1LknmLrbfhg_yCioD_hE';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const KAISEI_DOMAIN = 'gll-kaisei-s.sapporo-c.ed.jp';
    let viewDate = new Date();
    let tasks = [];
    let currentTeam = localStorage.getItem('kaisei_current_team') || 'A';
    let isMultiMode = false;
    let selectedDates = new Set();
    let currentFilters = new Set(['all']);
    let userSession = null;
    let isKaiseiUser = false;

    const subjectsMap = {
        math:'数学', english:'英語', gengoku:'現国', genbun:'言文',
        kasei:'化生', butsuchi:'物地', koukyo:'公共', chisou:'地総',
        info:'情報', health:'保体', art:'芸術', home:'家庭', other:'他'
    };

    async function init() {
        renderTabs();
        renderFilters();
        updateMonthLabel();
        
        const { data: { session } } = await supabaseClient.auth.getSession();
        updateAuthUI(session);
        supabaseClient.auth.onAuthStateChange((_, s) => updateAuthUI(s));

        await fetchTasks();
        render();
        supabaseClient.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => fetchTasks()).subscribe();
    }

    async function login() {
        const { data } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google', options: { redirectTo: window.location.href, skipBrowserRedirect: true }
        });
        if (data.url) window.open(data.url, '_blank');
    }

    async function logout() { await supabaseClient.auth.signOut(); window.location.reload(); }

    function updateAuthUI(session) {
        userSession = session;
        if (session) {
            document.getElementById('btn-login').style.display = 'none';
            document.getElementById('login-notice').style.display = 'none';
            document.getElementById('user-profile').style.display = 'flex';
            isKaiseiUser = session.user.email.endsWith(KAISEI_DOMAIN);
            document.getElementById('user-info').innerHTML = `<img src="${session.user.user_metadata.avatar_url}" width="24" height="24" style="border-radius:50%"><span>${session.user.user_metadata.full_name}</span>`;
            fetchTasks();
        }
    }

    async function fetchTasks() {
        if (!userSession) return;
        let query = supabaseClient.from('tasks').select('*').eq('team', currentTeam);
        if (!isKaiseiUser) query = query.eq('user_id', userSession.user.id);
        const { data } = await query;
        if (data) { tasks = data; render(); }
    }

    async function addSingleTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const subId = document.getElementById('taskSubject').value;
        if(!name || !date || !userSession) return alert("情報を入力してください");
        await supabaseClient.from('tasks').insert([{ team: currentTeam, name: `${subjectsMap[subId]}：${name}`, deadline: date, subject: subId, user_id: userSession.user.id }]);
        document.getElementById('taskName').value = '';
        selectedDates.clear(); render();
    }

    async function addMultiTasks() {
        const name = document.getElementById('taskName').value;
        const subId = document.getElementById('taskSubject').value;
        const newTasks = Array.from(selectedDates).map(d => ({ team: currentTeam, name: `${subjectsMap[subId]}：${name}`, deadline: d, subject: subId, user_id: userSession.user.id }));
        await supabaseClient.from('tasks').insert(newTasks);
        toggleMultiMode(); document.getElementById('taskName').value = '';
    }

    async function deleteTask(id) {
        if(confirm("削除しますか？")) await supabaseClient.from('tasks').delete().eq('id', id);
    }

    function renderTabs() {
        const container = document.getElementById('teamTabs');
        container.innerHTML = '';
        ['A','B','C','D','E','F'].forEach(t => {
            const btn = document.createElement('div');
            btn.className = `team-tab ${currentTeam === t ? 'active' : ''}`;
            btn.innerText = `TEAM ${t}`;
            btn.onclick = () => { currentTeam = t; localStorage.setItem('kaisei_current_team', t); renderTabs(); fetchTasks(); };
            container.appendChild(btn);
        });
    }

    function renderFilters() {
        const grid = document.getElementById('filterGrid');
        Object.keys(subjectsMap).forEach(id => {
            const chip = document.createElement('div');
            chip.className = 'filter-chip';
            chip.dataset.sub = id; chip.innerText = subjectsMap[id];
            chip.onclick = () => setFilter(id);
            grid.appendChild(chip);
        });
    }

    function setFilter(sub) {
        if (sub === 'all') { currentFilters.clear(); currentFilters.add('all'); }
        else {
            currentFilters.delete('all');
            if (currentFilters.has(sub)) { currentFilters.delete(sub); if(currentFilters.size===0) currentFilters.add('all'); }
            else currentFilters.add(sub);
        }
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', currentFilters.has(c.dataset.sub || 'all')));
        render();
    }

    function toggleMultiMode() {
        isMultiMode = !isMultiMode;
        selectedDates.clear();
        document.getElementById('modeSwitch').classList.toggle('active', isMultiMode);
        document.getElementById('toggleIcon').className = isMultiMode ? "fas fa-check-double" : "fas fa-toggle-off";
        document.getElementById('toggleIcon').style.color = isMultiMode ? "#1a73e8" : "#ccc";
        document.getElementById('singleAction').style.display = isMultiMode ? "none" : "block";
        document.getElementById('multiAction').style.display = isMultiMode ? "block" : "none";
        render();
    }

    function handleDateClick(dateStr) {
        if (!isMultiMode) document.getElementById('taskDate').value = dateStr;
        else {
            if (selectedDates.has(dateStr)) selectedDates.delete(dateStr);
            else selectedDates.add(dateStr);
            document.getElementById('selectedCount').innerText = `${selectedDates.size} 日選択中`;
            document.getElementById('confirmBtn').disabled = selectedDates.size === 0;
        }
        render();
    }

    function updateMonthLabel() { document.getElementById('monthLabel').innerText = `${viewDate.getFullYear()}年 ${viewDate.getMonth() + 1}月`; }
    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); updateMonthLabel(); render(); }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="cal-label">${d}</div>`);
        const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const last = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell" style="background:#fafafa; cursor:default;"></div>`;
        for(let d=1; d<=last; d++) {
            const dateStr = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toLocaleDateString('sv-SE') === dateStr;
            const isSelected = selectedDates.has(dateStr);
            let html = `<div class="cal-cell ${isToday?'today':''} ${isSelected?'selected':''}" onclick="handleDateClick('${dateStr}')"><span class="day-num">${d}</span>`;
            tasks.filter(t => t.deadline === dateStr && (currentFilters.has('all') || currentFilters.has(t.subject))).forEach(t => {
                html += `<div class="task-bar bg-${t.subject}"><span>${t.name}</span><i class="fas fa-times" onclick="event.stopPropagation();deleteTask('${t.id}')"></i></div>`;
            });
            grid.innerHTML += html + `</div>`;
        }
    }

    function syncTheme() { document.body.classList.toggle('dark-mode', localStorage.getItem('app_theme') === 'dark'); }
    syncTheme(); setInterval(syncTheme, 500); init();
</script>
</body>
</html>
