<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kaisei Task Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --urgent: #d93025; --soon: #f9ab00; --safe: #1e8e3e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #202124; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #ddd; }
        h1 { font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* 入力エリア */
        .input-group { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 30px; background: #f1f3f4; padding: 15px; border-radius: 12px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* タスクリスト */
        .task-list { list-style: none; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .task-item:hover { background: #f8f9fa; }
        .task-info { display: flex; flex-direction: column; gap: 4px; }
        .task-name { font-weight: bold; font-size: 16px; }
        .task-meta { font-size: 12px; color: #5f6368; }
        
        /* 期限バッジ */
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; }
        .urgent { background: var(--urgent); } /* 3日以内 */
        .soon { background: var(--soon); }   /* 7日以内 */
        .safe { background: var(--safe); }   /* それ以上 */

        .btn-delete { color: #aaa; cursor: pointer; transition: 0.2s; }
        .btn-delete:hover { color: var(--urgent); }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-tasks" style="color:var(--primary)"></i> Kaisei Task Manager</h1>
    
    <div class="input-group">
        <input type="text" id="taskName" placeholder="課題名を入力 (例: 数学プリント)">
        <input type="date" id="taskDate">
        <select id="taskCategory">
            <option value="提出物">提出物</option>
            <option value="小テスト">小テスト</option>
            <option value="考査">定期考査</option>
        </select>
        <button class="btn-add" onclick="addTask()">追加</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('kaisei_tasks')) || [];

    function save() {
        localStorage.setItem('kaisei_tasks', JSON.stringify(tasks));
        render();
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const cat = document.getElementById('taskCategory').value;
        if(!name || !date) return alert("入力してください");

        tasks.push({ id: Date.now(), name, date, cat });
        document.getElementById('taskName').value = '';
        save();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        save();
    }

    function getRemainingDays(dateStr) {
        const diff = new Date(dateStr) - new Date().setHours(0,0,0,0);
        return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function render() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        
        // 期限が近い順に並び替え
        tasks.sort((a, b) => new Date(a.date) - new Date(b.date));

        tasks.forEach(t => {
            const days = getRemainingDays(t.date);
            let statusClass = days <= 3 ? 'urgent' : (days <= 7 ? 'soon' : 'safe');
            let statusText = days < 0 ? '期限切れ' : (days === 0 ? '今日まで' : `あと ${days} 日`);

            list.innerHTML += `
                <li class="task-item">
                    <div class="task-info">
                        <span class="task-name">${t.name}</span>
                        <span class="task-meta">${t.cat} | 締切: ${t.date}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:20px;">
                        <span class="badge ${statusClass}">${statusText}</span>
                        <i class="fas fa-trash-alt btn-delete" onclick="deleteTask(${t.id})"></i>
                    </div>
                </li>
            `;
        });
    }

    render();
</script>
</body>
</html>
