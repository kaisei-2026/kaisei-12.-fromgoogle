<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaisei Task Manager - Responsive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --border: #dadce0; --today-bg: #fff9c4; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #f8f9fa; color: #202124; padding: 10px; font-size: 14px; }

        /* レイアウト切り替え */
        .layout { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: row; gap: 15px; }
        @media (max-width: 850px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100% !important; position: static !important; }
            .cal-cell { min-height: 80px !important; }
            .day-num { font-size: 10px !important; }
            .task-bar { font-size: 8px !important; padding: 1px 3px !important; }
        }

        .sidebar { width: 300px; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 10px; }
        .calendar-container { flex: 1; background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }

        input, select { width: 100%; padding: 10px; margin: 5px 0 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; } /* スマホでズームしないよう16px */
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        .cal-label { padding: 8px; text-align: center; font-size: 10px; font-weight: bold; background: #f1f3f4; color: #70757a; }
        .cal-cell { min-height: 110px; border: 0.1px solid #f1f3f4; padding: 2px; position: relative; }
        .cal-cell.today { background: var(--today-bg) !important; }
        .cal-cell.selected { background: #e8f0fe; border: 2px solid var(--primary); }
        .day-num { font-size: 11px; font-weight: bold; margin-bottom: 3px; display: block; padding-left: 2px; }

        .task-bar { font-size: 9px; padding: 2px 4px; border-radius: 4px; margin-bottom: 1px; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .bg-math { background: #ea4335; } .bg-english { background: #4285f4; } .bg-gengoku { background: #f06292; } 
        /* ... 他の教科の色も同様 ... */
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <h2 style="font-size:16px; margin-bottom:10px;"><i class="fas fa-plus-circle"></i> 課題登録</h2>
        <input type="text" id="taskName" placeholder="タイトル">
        <select id="taskSubject">
            <option value="math">数学</option><option value="english">英語</option>
            <option value="gengoku">現国</option><option value="genbun">言文</option>
        </select>
        <input type="date" id="taskDate">
        <button class="btn-main" onclick="addSingleTask()">保存</button>

        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
            <p style="font-size:11px; color:#666;">表示フィルター</p>
            <div id="filters" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;">
                <button onclick="setFilter('all')" style="font-size:10px; padding:4px 8px; border-radius:4px; border:1px solid #ddd; background:white;">すべて</button>
            </div>
        </div>
    </div>

    <div class="calendar-container">
        <div class="cal-header">
            <button onclick="changeMonth(-1)" style="border:none; background:none; padding:10px;"><i class="fas fa-chevron-left"></i></button>
            <h2 id="monthLabel" style="font-size: 16px;"></h2>
            <button onclick="changeMonth(1)" style="border:none; background:none; padding:10px;"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="grid"></div>
    </div>
</div>

<script>
    // Supabase初期化（ここは自分のものに書き換えてください）
    const SUPABASE_URL = 'YOUR_URL';
    const SUPABASE_KEY = 'YOUR_KEY';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let tasks = [];
    let viewDate = new Date();
    let currentTeam = localStorage.getItem('kaisei_current_team') || 'A';

    async function init() {
        document.getElementById('monthLabel').innerText = `${viewDate.getFullYear()}年 ${viewDate.getMonth()+1}月`;
        await fetchTasks();
        render();
        // リアルタイム
        supabaseClient.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => fetchTasks()).subscribe();
    }

    async function fetchTasks() {
        const { data } = await supabaseClient.from('tasks').select('*').eq('team', currentTeam);
        if(data) { tasks = data; render(); }
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="cal-label">${d}</div>`);
        const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const last = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell" style="background:#fafafa"></div>`;
        for(let d=1; d<=last; d++) {
            const dateStr = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toLocaleDateString('sv-SE') === dateStr;
            let html = `<div class="cal-cell ${isToday?'today':''}" onclick="document.getElementById('taskDate').value='${dateStr}'"><span class="day-num">${d}</span>`;
            tasks.filter(t => t.deadline === dateStr).forEach(t => {
                html += `<div class="task-bar bg-${t.subject}"><span>${t.name}</span></div>`;
            });
            grid.innerHTML += html + `</div>`;
        }
    }
    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth()+n); init(); }
    init();
</script>
</body>
</html>
