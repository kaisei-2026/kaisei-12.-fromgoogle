<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Task Manager - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --border: #dadce0; --today-bg: #fff9c4; --selected-bg: #e8f0fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #f8f9fa; color: #202124; padding: 10px; font-size: 14px; overflow-x: hidden; transition: background 0.3s; }
        body.dark-mode { background: #0a0a0a; color: #e0e0e0; --border: #27272a; --today-bg: #423b00; --selected-bg: rgba(26,115,232,0.2); }
        .wrapper { width: 100%; margin: 0; }
        .auth-notice { background: #ffffff; border: 2px solid var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.1); }
        body.dark-mode .auth-notice { background: #18181b; border-color: #333; }
        .auth-notice h3 { font-size: 13px; color: var(--primary); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
        .auth-notice p { font-size: 11px; color: #5f6368; line-height: 1.5; }
        .id-login-box { display: flex; gap: 5px; margin-bottom: 10px; }
        .id-input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: bold; }
        .team-tabs { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .team-tab { padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: 0.2s; }
        body.dark-mode .team-tab { background: #1e1e1e; color: #aaa; border-color: #333; }
        .team-tab.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(26,115,232,0.3); }
        .layout { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        @media (min-width: 1000px) { .layout { flex-direction: row; align-items: flex-start; } .sidebar { width: 320px !important; position: sticky; top: 5px; } }
        .sidebar { width: 100%; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.3s; }
        body.dark-mode .sidebar { background: #18181b; }
        input, select { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; background: #fff; }
        body.dark-mode input, body.dark-mode select { background: #2d2d2d; color: #fff; border-color: #444; }
        .mode-tabs { display: flex; background: #f1f3f4; padding: 4px; border-radius: 10px; margin: 10px 0; }
        body.dark-mode .mode-tabs { background: #2d2d2d; }
        .mode-tab { flex: 1; text-align: center; font-size: 10px; font-weight: bold; padding: 8px; cursor: pointer; border-radius: 7px; color: #666; }
        .mode-tab.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .session-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 5px; }
        .session-btn { padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 10px; text-align: center; cursor: pointer; font-weight: bold; background: #fff; }
        .session-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-main { width: 100%; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .btn-add { background: var(--primary); }
        .btn-google { background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; height: 50px; font-size: 12px;}
        .calendar-container { flex: 1; background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; width: 100%; }
        body.dark-mode .calendar-container { background: #18181b; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        .cal-label { padding: 10px 0; text-align: center; font-size: 11px; font-weight: bold; color: #70757a; background: #f8f9fa; border-bottom: 1px solid var(--border); }
        body.dark-mode .cal-label { background: #1e1e1e; }
        .cal-cell { min-height: 125px; border: 0.1px solid #f1f3f4; padding: 3px; position: relative; cursor: pointer; display: flex; flex-direction: column; }
        body.dark-mode .cal-cell { border-color: #222; }
        .cal-cell.today { background: var(--today-bg) !important; }
        .cal-cell.selected { border: 2.5px solid var(--primary) !important; background: var(--selected-bg); z-index: 2; }
        .day-num { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: #3c4043; }
        body.dark-mode .day-num { color: #ccc; }
        .session-slot { height: 19px; margin-bottom: 2px; width: 100%; position: relative; }
        .task-bar { height: 100%; font-size: 9px; padding: 0 6px; color: white; font-weight: bold; display: flex; align-items: center; cursor: pointer; position: absolute; inset: 0; z-index: 5; }
        .task-bar span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .task-bar.range-start { border-radius: 4px 0 0 4px; margin-right: -3px; }
        .task-bar.range-mid { border-radius: 0; margin-left: -3px; margin-right: -3px; }
        .task-bar.range-end { border-radius: 0 4px 4px 0; margin-left: -3px; }
        .task-bar.single { border-radius: 4px; }
        .task-bar i { margin-left: auto; font-size: 8px; padding: 2px; }
        .bg-math { background: #ea4335; } .bg-english { background: #4285f4; } .bg-gengoku { background: #f06292; } 
        .bg-genbun { background: #ba68c8; } .bg-kasei { background: #34a853; } .bg-butsuchi { background: #81c784; }
        .bg-koukyo { background: #fbbc04; } .bg-chisou { background: #ff8f00; } .bg-info { background: #00acc1; } 
        .bg-health { background: #00897b; } .bg-art { background: #7986cb; } .bg-home { background: #a1887f; } .bg-other { background: #90a4ae; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="team-tabs" id="teamTabs"></div>

    <div id="auth-section">
        <div class="auth-notice" id="login-notice">
            <h3><i class="fas fa-graduation-cap"></i> 札幌開成 ログイン</h3>
            <p><strong>学校アカウント</strong>または<strong>共有ID</strong>でログインしてください。</p>
            <div class="id-login-box" style="margin-top:10px;">
                <input type="text" id="nexusIdInput" class="id-input" placeholder="共有IDを入力 (例: TeamA)">
                <button onclick="loginWithId()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">IDで同期</button>
            </div>
        </div>
        <button id="btn-login-google" class="btn-main btn-google" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Googleログイン
        </button>
        <div id="user-profile" style="display:none; align-items:center; justify-content:space-between; background:#fff; padding:10px; border-radius:12px; margin-bottom:10px;">
            <div id="user-info" style="display:flex; align-items:center; gap:10px;"></div>
            <button onclick="logout()" style="background:none; border:none; color:#f28b82; font-size:11px; cursor:pointer; font-weight:bold;">解除</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <h2><i class="fas fa-plus-circle"></i> 課題追加</h2>
            <div class="mode-tabs">
                <div class="mode-tab active" id="tab-single" onclick="setMode('single')">1日</div>
                <div class="mode-tab" id="tab-multi" onclick="setMode('multi')">複数</div>
                <div class="mode-tab" id="tab-range" onclick="setMode('range')">期間</div>
            </div>
            <label>タイトル</label><input type="text" id="taskName">
            <label>セッション (1〜4)</label>
            <div class="session-grid">
                <div class="session-btn active" data-val="1" onclick="setSession(1)">1</div>
                <div class="session-btn" data-val="2" onclick="setSession(2)">2</div>
                <div class="session-btn" data-val="3" onclick="setSession(3)">3</div>
                <div class="session-btn" data-val="4" onclick="setSession(4)">4</div>
            </div>
            <label>科目</label>
            <select id="taskSubject">
                <option value="math">数学</option><option value="english">英語</option><option value="gengoku">現国</option>
                <option value="genbun">言文</option><option value="kasei">化生</option><option value="butsuchi">物地</option>
                <option value="koukyo">公共</option><option value="chisou">地総</option><option value="info">情報</option>
                <option value="health">保健体育</option><option value="art">芸術</option><option value="home">家庭科</option><option value="other">その他</option>
            </select>
            <div id="input-single"><label>日付</label><input type="date" id="taskDate"><button class="btn-main btn-add" onclick="addTask('single')">クラウド保存</button></div>
            <div id="input-multi" style="display:none;"><p id="multiCount" style="font-size:11px; text-align:center; color:var(--primary); margin:10px 0;">0日選択中</p><button class="btn-main" style="background:#1e8e3e" id="confirmBtn" disabled onclick="addTask('multi')">確定</button></div>
            <div id="input-range" style="display:none;"><label>開始日</label><input type="date" id="startDate"><label>終了日</label><input type="date" id="endDate"><button class="btn-main" style="background:#673ab7" onclick="addTask('range')">期間保存</button></div>
        </div>

        <div class="calendar-container">
            <div class="cal-header">
                <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer;"><i class="fas fa-chevron-left"></i></button>
                <h2 id="monthLabel" style="font-size: 16px; font-weight: 800;"></h2>
                <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer;"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="cal-grid" id="grid"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ahovehkshnnlipcssilm.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_aoTV062URNq1LknmLrbfhg_yCioD_hE';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const KAISEI_DOMAIN = 'gll-kaisei-s.sapporo-c.ed.jp';
    let viewDate = new Date();
    let tasks =[];
    let currentTeam = localStorage.getItem('nexus_team') || 'A';
    let currentMode = 'single';
    let currentSession = 1;
    let selectedDates = new Set();
    let currentUserId = localStorage.getItem('nexus_user_id') || null;
    let isKaisei = false;

    const subjectsMap = { math:'数学', english:'英語', gengoku:'現国', genbun:'言文', kasei:'化生', butsuchi:'物地', koukyo:'公共', chisou:'地総', info:'情報', health:'保体', art:'芸術', home:'家庭', other:'他' };

    async function init() {
        renderTabs();
        updateMonthLabel();
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUserId = session.user.id;
            isKaisei = session.user.email.endsWith(KAISEI_DOMAIN);
            updateUI(session.user.user_metadata.full_name, session.user.user_metadata.avatar_url);
        } else if (currentUserId && !currentUserId.includes('-')) {
            updateUI(currentUserId, null);
        }
        await fetchTasks();
        render();
        supabase.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => fetchTasks()).subscribe();
    }

    async function loginWithGoogle() {
        // 🌟 修正: スコープを制限して学校アカウント制限を回避
        const { data, error } = await supabase.auth.signInWithOAuth({ 
            provider: 'google', 
            options: { 
                redirectTo: window.location.href, 
                skipBrowserRedirect: true,
                queryParams: { scope: 'openid email profile' } 
            } 
        });
        if (data.url) window.open(data.url, '_blank');
        if (error) alert("ログインエラー: " + error.message);
    }

    function loginWithId() {
        const id = document.getElementById('nexusIdInput').value;
        if (!id) return alert("IDを入力してください");
        currentUserId = id;
        localStorage.setItem('nexus_user_id', id);
        updateUI(id, null);
        fetchTasks();
    }

    function logout() { localStorage.removeItem('nexus_user_id'); supabase.auth.signOut(); window.location.reload(); }

    function updateUI(name, img) {
        document.getElementById('login-notice').style.display = 'none';
        document.getElementById('btn-login-google').style.display = 'none';
        document.getElementById('user-profile').style.display = 'flex';
        document.getElementById('user-info').innerHTML = img ? `<img src="${img}" width="24" height="24" style="border-radius:50%"><span>${name}</span>` : `<span><i class="fas fa-id-badge"></i> ID: ${name}</span>`;
    }

    async function fetchTasks() {
        if (!currentUserId) return;
        
        // ログを出してデータ取得状況を確認
        console.log("Fetching tasks for user:", currentUserId);
        
        const { data, error } = await supabase
            .from('tasks')
            .select('*')
            .eq('team', currentTeam);
            
        if (error) {
            console.error("Supabase Error:", error);
            alert("タスク読み込みエラー: " + error.message);
        }
        
        if (data) {
            console.log("Tasks loaded:", data);
            tasks = data; 
            render(); 
        }
    }

    async function addTask(type) {
        if (!currentUserId) return alert("ログインが必要です");
        const name = document.getElementById('taskName').value;
        const subId = document.getElementById('taskSubject').value;
        if (!name) return alert("タイトルを入力してください");

        let toInsert =[];
        if (type === 'single') {
            const date = document.getElementById('taskDate').value;
            toInsert.push({ team: currentTeam, name: `${subjectsMap[subId]}：${name}`, deadline: date, subject: subId, user_id: currentUserId, session: currentSession });
        } else if (type === 'multi') {
            Array.from(selectedDates).forEach(d => toInsert.push({ team: currentTeam, name: `${subjectsMap[subId]}：${name}`, deadline: d, subject: subId, user_id: currentUserId, session: currentSession }));
        } else if (type === 'range') {
            let curr = new Date(document.getElementById('startDate').value);
            let last = new Date(document.getElementById('endDate').value);
            let gid = "range_" + Date.now();
            while(curr <= last) {
                toInsert.push({ team: currentTeam, name: `[${gid}]${subjectsMap[subId]}：${name}`, deadline: curr.toISOString().split('T')[0], subject: subId, user_id: currentUserId, session: currentSession });
                curr.setDate(curr.getDate() + 1);
            }
        }
        await supabase.from('tasks').insert(toInsert);
        resetSelection();
    }

    async function deleteTask(id, name) {
        if(!confirm("削除しますか？")) return;
        if (name.startsWith("[range_")) {
            const gid = name.split(']')[0] + "]";
            const { data } = await supabase.from('tasks').select('id').ilike('name', `${gid}%`);
            await supabase.from('tasks').delete().in('id', data.map(d => d.id));
        } else await supabase.from('tasks').delete().eq('id', id);
    }

    function setMode(mode) {
        currentMode = mode; resetSelection();
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${mode}`).classList.add('active');
        document.getElementById('input-single').style.display = mode === 'single' ? 'block' : 'none';
        document.getElementById('input-multi').style.display = mode === 'multi' ? 'block' : 'none';
        document.getElementById('input-range').style.display = mode === 'range' ? 'block' : 'none';
        render();
    }

    function setSession(s) { currentSession = s; document.querySelectorAll('.session-btn').forEach(b => b.classList.toggle('active', b.dataset.val == s)); }
    function resetSelection() { selectedDates.clear(); document.getElementById('taskDate').value=''; document.getElementById('startDate').value=''; document.getElementById('endDate').value=''; render(); }

    function handleDateClick(dateStr) {
        if (currentMode === 'single') document.getElementById('taskDate').value = dateStr;
        else if (currentMode === 'multi') { selectedDates.has(dateStr) ? selectedDates.delete(dateStr) : selectedDates.add(dateStr); document.getElementById('multiCount').innerText = `${selectedDates.size}日選択中`; document.getElementById('confirmBtn').disabled = selectedDates.size === 0; }
        else if (currentMode === 'range') {
            const s = document.getElementById('startDate'); const e = document.getElementById('endDate');
            if (!s.value || (s.value && e.value)) { s.value = dateStr; e.value = ''; } else { new Date(dateStr) < new Date(s.value) ? s.value = dateStr : e.value = dateStr; }
        }
        render();
    }

    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="cal-label">${d}</div>`);
        const year = viewDate.getFullYear(); const month = viewDate.getMonth();
        const first = new Date(year, month, 1).getDay(); const last = new Date(year, month + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell" style="background:rgba(0,0,0,0.03);"></div>`;
        for(let d=1; d<=last; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toLocaleDateString('sv-SE') === dateStr;
            const isSelected = selectedDates.has(dateStr) || document.getElementById('startDate').value === dateStr || document.getElementById('endDate').value === dateStr;
            let html = `<div class="cal-cell ${isToday?'today':''} ${isSelected?'selected':''}" onclick="handleDateClick('${dateStr}')"><span class="day-num">${d}</span>`;
            
            const dayTasks = tasks.filter(t => t.deadline === dateStr).sort((a,b) => (b.name.includes('[range') ? 1 : 0) - (a.name.includes('[range') ? 1 : 0) || (a.session||1) - (b.session||1));
            for (let s = 1; s <= 4; s++) {
                html += `<div class="session-slot">`;
                const task = dayTasks.find(t => (t.session || 1) == s);
                if (task) {
                    let rClass = 'single'; let dName = task.name;
                    if (task.name.startsWith("[range_")) {
                        const gid = task.name.split(']')[0] + "]";
                        const group = tasks.filter(g => g.name.startsWith(gid)).sort((a,b)=>a.deadline.localeCompare(b.deadline));
                        dName = task.name.split(']')[1];
                        if (task.deadline === group[0].deadline) rClass = 'range-start';
                        else if (task.deadline === group[group.length-1].deadline) rClass = 'range-end';
                        else rClass = 'range-mid';
                    }
                    html += `<div class="task-bar bg-${task.subject} ${rClass}" onclick="event.stopPropagation(); alert('${dName}\\nセッション: ${task.session||1}')">
                             <span>${rClass==='range-end'?'→ ':''}${dName}</span>
                             ${rClass!=='range-mid'?`<i class="fas fa-times" onclick="event.stopPropagation(); deleteTask('${task.id}', '${task.name}')"></i>`:''}
                             </div>`;
                }
                html += `</div>`;
            }
            grid.innerHTML += html + `</div>`;
        }
    }

    function renderTabs() { const c = document.getElementById('teamTabs'); c.innerHTML = '';['A','B','C','D','E','F'].forEach(t => { const b = document.createElement('div'); b.className = `team-tab ${currentTeam === t ? 'active' : ''}`; b.innerText = `TEAM ${t}`; b.onclick = () => { currentTeam = t; localStorage.setItem('nexus_team', t); renderTabs(); fetchTasks(); }; c.appendChild(b); }); }
    function updateMonthLabel() { document.getElementById('monthLabel').innerText = `${viewDate.getFullYear()}年 ${viewDate.getMonth() + 1}月`; }
    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); updateMonthLabel(); render(); }
    function syncTheme() { document.body.classList.toggle('dark-mode', localStorage.getItem('app_theme') === 'dark'); }
    setInterval(syncTheme, 500); init();
</script>
</body>
</html>
