<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaisei Task Manager - Security Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --border: #dadce0; --today-bg: #fff9c4; --selected-bg: #e8f0fe; --google-blue: #4285f4; --error: #d93025; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #f8f9fa; color: #202124; padding: 10px; font-size: 14px; overflow-x: hidden; transition: background 0.3s; }
        body.dark-mode { background: #0a0a0a; color: #e0e0e0; --border: #27272a; --today-bg: #423b00; }
        .wrapper { width: 100%; margin: 0; }
        
        /* ログイン・エラー通知 */
        .auth-notice { background: #ffffff; border: 2px solid var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(26,115,232,0.1); }
        body.dark-mode .auth-notice { background: #18181b; border-color: #333; }
        .error-box { background: #fff3f3; border: 2px solid var(--error); padding: 15px; border-radius: 12px; margin-bottom: 15px; color: var(--error); font-weight: bold; text-align: center; }

        .team-tabs { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .team-tab { padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.2s; flex-shrink: 0; }
        body.dark-mode .team-tab { background: #1e1e1e; color: #aaa; border-color: #333; }
        .team-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        .layout { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        @media (min-width: 1000px) { .layout { flex-direction: row; align-items: flex-start; } .sidebar { width: 320px !important; position: sticky; top: 5px; } }
        
        .sidebar { width: 100%; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        body.dark-mode .sidebar { background: #18181b; }
        h2 { font-size: 14px; margin-bottom: 10px; color: var(--primary); font-weight: 800; display: flex; align-items: center; gap: 5px; }
        input, select { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; background: #fff; }
        body.dark-mode input, body.dark-mode select { background: #2d2d2d; color: #fff; border-color: #444; }

        .btn-main { width: 100%; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .btn-add { background: var(--primary); }
        .btn-google { background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-sync { background: var(--google-blue); margin-top: 15px; }

        /* カレンダー */
        .calendar-container { flex: 1; background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        body.dark-mode .calendar-container { background: #18181b; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        .cal-label { padding: 10px 0; text-align: center; font-size: 11px; font-weight: bold; color: #70757a; background: #f8f9fa; border-bottom: 1px solid var(--border); }
        body.dark-mode .cal-label { background: #1e1e1e; color: #888; }
        .cal-cell { min-height: 100px; border: 0.1px solid #f1f3f4; padding: 3px; position: relative; cursor: pointer; }
        body.dark-mode .cal-cell { border-color: #222; }
        .cal-cell.today { background: var(--today-bg) !important; }
        .day-num { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: #3c4043; }
        body.dark-mode .day-num { color: #ccc; }
        
        .task-bar { font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: grab; }
        
        .bg-math { background: #ea4335; } .bg-english { background: #4285f4; } .bg-gengoku { background: #f06292; } 
        .bg-genbun { background: #ba68c8; } .bg-kasei { background: #34a853; } .bg-butsuchi { background: #81c784; }
        .bg-koukyo { background: #fbbc04; } .bg-chisou { background: #ff8f00; } .bg-info { background: #00acc1; } 
        .bg-health { background: #00897b; } .bg-art { background: #7986cb; } .bg-home { background: #a1887f; } .bg-other { background: #90a4ae; }

        #user-profile { display: none; align-items: center; justify-content: space-between; padding: 10px; background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; }
        body.dark-mode #user-profile { background: #2d2d2d; }
        #user-info { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: bold; }
        #user-info img { width: 24px; height: 24px; border-radius: 50%; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="loading-overlay"><i class="fas fa-circle-notch fa-spin"></i><br>同期中...</div>

<div class="wrapper" id="main-content" style="display:none;">
    <!-- ドメインエラー表示 -->
    <div id="domain-error" class="error-box" style="display:none;">
        <i class="fas fa-user-lock"></i> アクセス制限：開成学校用アカウント以外では共有機能を利用できません。
    </div>

    <!-- ログインセクション -->
    <div id="auth-section">
        <div class="auth-notice" id="login-notice">
            <h3><i class="fas fa-graduation-cap"></i> 開成生ログイン</h3>
            <p><strong>@gll-kaisei-s.sapporo-c.ed.jp</strong> でログインすると、チーム全員で課題を共有できます。</p>
        </div>
        <button id="btn-login" class="btn-main btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
            Googleログインを有効にする
        </button>
        <div id="user-profile">
            <div id="user-info"></div>
            <button onclick="logout()" style="background:none; border:none; color:#d93025; font-size:11px; cursor:pointer; font-weight:bold;">ログアウト</button>
        </div>
    </div>

    <div class="team-tabs" id="teamTabs"></div>

    <div class="layout">
        <div class="sidebar">
            <div id="control-panel">
                <h2><i class="fas fa-plus-circle"></i> 課題登録</h2>
                <input type="text" id="taskName" placeholder="例: レポート第1回">
                <select id="taskSubject">
                    <option value="math">数学</option><option value="english">英語</option><option value="gengoku">現国</option>
                    <option value="genbun">言文</option><option value="kasei">化生</option><option value="butsuchi">物地</option>
                    <option value="koukyo">公共</option><option value="chisou">地総</option><option value="info">情報</option>
                    <option value="health">保健体育</option><option value="art">芸術</option><option value="home">家庭科</option><option value="other">その他</option>
                </select>
                <input type="date" id="taskDate">
                <button class="btn-main btn-add" onclick="addSingleTask()">クラウドに保存</button>

                <button id="btn-sync" class="btn-main btn-sync" style="display:none;" onclick="syncToGoogle()">
                    <i class="fab fa-google"></i> Googleカレンダーへ同期
                </button>
            </div>
            
            <div class="filter-section">
                <label>表示フィルター</label>
                <div class="filter-grid" id="filterGrid">
                    <div class="filter-chip active" id="filter-all" style="width:100%; margin-bottom:5px;" onclick="setFilter('all')">すべて表示</div>
                </div>
            </div>
        </div>

        <div class="calendar-container">
            <div class="cal-header">
                <button onclick="changeMonth(-1)" style="border:none; background:none; padding:10px;"><i class="fas fa-chevron-left"></i></button>
                <h2 id="monthLabel" style="font-size: 16px; font-weight: 800;"></h2>
                <button onclick="changeMonth(1)" style="border:none; background:none; padding:10px;"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="cal-grid" id="grid"></div>
        </div>
    </div>
</div>

<script>
    // 🌟 --- 自分の情報を貼り付けてください --- 🌟
    const SUPABASE_URL = 'https://ahovehkshnnlipcssilm.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_aoTV062URNq1LknmLrbfhg_yCioD_hE';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ALLOWED_DOMAIN = 'gll-kaisei-s.sapporo-c.ed.jp';
    let viewDate = new Date();
    let tasks = [];
    let currentTeam = localStorage.getItem('kaisei_current_team') || 'A';
    let userSession = null;
    let currentFilters = new Set(['all']);

    const subjectsMap = {
        math:'数学', english:'英語', gengoku:'現国', genbun:'言文',
        kasei:'化生', butsuchi:'物地', koukyo:'公共', chisou:'地総',
        info:'情報', health:'保体', art:'芸術', home:'家庭', other:'他'
    };

    async function init() {
        document.getElementById('main-content').style.display = 'block';
        renderTabs();
        renderFilters();
        updateMonthLabel();
        
        // ログイン状態を初回チェック
        const { data: { session } } = await supabaseClient.auth.getSession();
        updateAuthUI(session);

        // 🌟 自動ログインチェック（別タブからの復帰用）
        setInterval(async () => {
            if (!userSession) {
                const { data: { session: currentSession } } = await supabaseClient.auth.getSession();
                if (currentSession) updateAuthUI(currentSession);
            }
        }, 2000);

        await fetchTasks();
        render();

        supabaseClient.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => fetchTasks()).subscribe();
    }

    async function login() {
        const { data, error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.href, skipBrowserRedirect: true }
        });
        if (data.url) window.open(data.url, '_blank');
    }

    async function logout() { await supabaseClient.auth.signOut(); window.location.reload(); }

    function updateAuthUI(session) {
        userSession = session;
        const loginBtn = document.getElementById('btn-login');
        const loginNotice = document.getElementById('login-notice');
        const profile = document.getElementById('user-profile');
        const domainError = document.getElementById('domain-error');
        const controlPanel = document.getElementById('control-panel');

        if (session) {
            const email = session.user.email;
            if (email.endsWith(ALLOWED_DOMAIN)) {
                // ✅ ドメイン一致：フルアクセス
                loginBtn.style.display = 'none';
                loginNotice.style.display = 'none';
                profile.style.display = 'flex';
                document.getElementById('btn-sync').style.display = 'block';
                document.getElementById('user-info').innerHTML = `
                    <img src="${session.user.user_metadata.avatar_url}">
                    <span>${session.user.user_metadata.full_name}</span>
                `;
            } else {
                // ❌ ドメイン不一致：制限
                domainError.style.display = 'block';
                controlPanel.style.display = 'none';
                profile.style.display = 'flex';
                document.getElementById('user-info').innerHTML = `<span>ゲスト様 (${email})</span>`;
            }
        }
    }

    async function fetchTasks() {
        if (!supabaseClient) return;
        const { data } = await supabaseClient.from('tasks').select('*').eq('team', currentTeam);
        if (data) { tasks = data; render(); }
    }

    async function addSingleTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const subId = document.getElementById('taskSubject').value;
        if(!name || !date) return alert("情報を入力してください");
        const finalTitle = `${subjectsMap[subId]}：${name}`;
        await supabaseClient.from('tasks').insert([{ team: currentTeam, name: finalTitle, deadline: date, subject: subId }]);
        document.getElementById('taskName').value = '';
    }

    async function syncToGoogle() {
        if (!userSession || !userSession.provider_token) {
            alert("Googleカレンダー同期には追加の権限が必要です。学校アカウントでは制限されるため、個人用Gmailでお試しください。");
            return;
        }
        document.getElementById('loading-overlay').style.display = 'flex';
        for (const task of tasks) {
            const event = {
                'summary': `【課題】${task.name}`,
                'start': { 'date': task.deadline },
                'end': { 'date': task.deadline }
            };
            await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${userSession.provider_token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(event)
            });
        }
        document.getElementById('loading-overlay').style.display = 'none';
        alert("Googleカレンダーへ同期しました！");
    }

    function renderTabs() {
        const container = document.getElementById('teamTabs');
        container.innerHTML = '';
        ['A','B','C','D','E','F'].forEach(t => {
            const btn = document.createElement('div');
            btn.className = `team-tab ${currentTeam === t ? 'active' : ''}`;
            btn.innerText = `TEAM ${t}`;
            btn.onclick = () => { currentTeam = t; localStorage.setItem('kaisei_current_team', t); renderTabs(); fetchTasks(); };
            container.appendChild(btn);
        });
    }

    function renderFilters() {
        const grid = document.getElementById('filterGrid');
        Object.keys(subjectsMap).forEach(id => {
            const chip = document.createElement('div');
            chip.className = 'filter-chip';
            chip.dataset.sub = id;
            chip.innerText = subjectsMap[id];
            chip.onclick = () => setFilter(id);
            grid.appendChild(chip);
        });
    }

    function setFilter(sub) {
        if (sub === 'all') { currentFilters.clear(); currentFilters.add('all'); }
        else {
            currentFilters.delete('all');
            if (currentFilters.has(sub)) { currentFilters.delete(sub); if(currentFilters.size===0) currentFilters.add('all'); }
            else currentFilters.add(sub);
        }
        document.querySelectorAll('.filter-chip').forEach(c => {
            const s = c.getAttribute('data-sub') || 'all';
            c.classList.toggle('active', currentFilters.has(s));
        });
        render();
    }

    function updateMonthLabel() { document.getElementById('monthLabel').innerText = `${viewDate.getFullYear()}年 ${viewDate.getMonth() + 1}月`; }
    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); updateMonthLabel(); render(); }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="cal-label">${d}</div>`);
        const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const last = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell" style="background:#fafafa; cursor:default;"></div>`;
        for(let d=1; d<=last; d++) {
            const dateStr = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toLocaleDateString('sv-SE') === dateStr;
            let html = `<div class="cal-cell ${isToday?'today':''}" onclick="document.getElementById('taskDate').value='${dateStr}'"><span class="day-num">${d}</span>`;
            tasks.filter(t => t.deadline === dateStr && (currentFilters.has('all') || currentFilters.has(t.subject))).forEach(t => {
                html += `<div class="task-bar bg-${t.subject}"><span>${t.name}</span></div>`;
            });
            grid.innerHTML += html + `</div>`;
        }
    }

    function syncTheme() {
        const theme = localStorage.getItem('app_theme') || 'light';
        if (theme === 'dark') document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
    }
    syncTheme();
    setInterval(syncTheme, 500);

    init();
</script>
</body>
</html>
