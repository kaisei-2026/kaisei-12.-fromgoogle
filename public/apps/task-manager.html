<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Nexus Task Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .team-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .team-tab { padding: 10px 20px; background: #eee; cursor: pointer; border-radius: 8px; }
        .team-tab.active { background: #1a73e8; color: white; }
        .btn-main { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; border: 1px solid #ccc; background: #ccc; }
        .cal-label { background: #f0f0f0; padding: 10px; text-align: center; font-weight: bold; }
        .cal-cell { background: white; min-height: 100px; padding: 5px; }
    </style>
</head>
<body>

<div class="team-tabs" id="teamTabs"></div>
<button class="btn-main" id="login-btn" onclick="loginWithGoogle()">Googleログイン</button>
<div id="user-info" style="margin-bottom:10px; font-weight:bold;"></div>

<input type="text" id="taskName" placeholder="タイトル" style="padding:10px; width:100%;">
<button class="btn-main" onclick="addTask()">保存</button>

<div id="monthLabel" style="font-weight:bold; margin-top:20px;"></div>
<div class="cal-grid" id="grid"></div>

<script>
    const SUPABASE_URL = 'https://ahovehkshnnlipcssilm.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_aoTV062URNq1LknmLrbfhg_yCioD_hE';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let viewDate = new Date();
    let tasks =[];
    let currentTeam = 'A';

    // 1. ページ読み込みと同時にカレンダー描画
    async function init() {
        renderTabs();
        renderCalendar(); // まずカレンダーを出す
        
        const { data } = await supabase.auth.getSession();
        if (data?.session) {
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('user-info').innerText = "ログイン中: " + data.session.user.email;
            fetchTasks();
        }
    }

    // 2. カレンダー描画（データがなくても枠は必ず出す）
    function renderCalendar() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="cal-label">${d}</div>`);
        
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        document.getElementById('monthLabel').innerText = (month + 1) + "月";
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="cal-cell"></div>`;
        for(let d=1; d<=lastDate; d++) {
            grid.innerHTML += `<div class="cal-cell">${d}</div>`;
        }
    }

    async function loginWithGoogle() {
        await supabase.auth.signInWithOAuth({ 
            provider: 'google', 
            options: { redirectTo: window.location.href, queryParams: { scope: 'openid email profile' } }
        });
    }

    async function fetchTasks() {
        const { data } = await supabase.from('tasks').select('*').eq('team', currentTeam);
        if (data) { tasks = data; renderCalendar(); } // 再描画
    }

    function renderTabs() {
        const c = document.getElementById('teamTabs');
        ['A','B','C'].forEach(t => {
            const b = document.createElement('div');
            b.className = `team-tab ${currentTeam === t ? 'active' : ''}`;
            b.innerText = t;
            b.onclick = () => { currentTeam = t; renderTabs(); fetchTasks(); };
            c.appendChild(b);
        });
    }

    init();
</script>
</body>
</html>
