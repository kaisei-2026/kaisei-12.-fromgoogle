<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaisei Task Manager - Pro Cloud</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --border: #dadce0; --today-bg: #fff9c4; --selected-bg: #e8f0fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: sans-serif; background: #f8f9fa; color: #202124; padding: 5px; font-size: 14px; overflow-x: hidden; }

        .wrapper { width: 100%; margin: 0; }

        /* チームタブ */
        .team-tabs { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .team-tabs::-webkit-scrollbar { display: none; }
        .team-tab { padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: 0.2s; }
        .team-tab.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(26,115,232,0.3); }

        .layout { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        @media (min-width: 1000px) {
            .layout { flex-direction: row; align-items: flex-start; }
            .sidebar { width: 320px !important; position: sticky; top: 5px; }
        }

        .sidebar { width: 100%; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 14px; margin-bottom: 10px; color: var(--primary); font-weight: 800; display: flex; align-items: center; gap: 5px; }
        
        label { font-size: 10px; font-weight: bold; color: #5f6368; margin-top: 8px; display: block; }
        input, select { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; background: #fff; }
        
        .btn-main { width: 100%; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 14px; transition: 0.2s; }
        .btn-add { background: var(--primary); }
        .btn-google { background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }

        .calendar-container { flex: 1; background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        .cal-label { padding: 10px 0; text-align: center; font-size: 11px; font-weight: bold; color: #70757a; background: #f8f9fa; border-bottom: 1px solid var(--border); }
        
        .cal-cell { min-height: 100px; border: 0.1px solid #f1f3f4; padding: 3px; position: relative; cursor: pointer; }
        .cal-cell.today { background: var(--today-bg) !important; }
        .cal-cell.selected { border: 2px solid var(--primary); background: var(--selected-bg); z-index: 2; }
        
        .day-num { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: #3c4043; }
        .task-bar { font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }

        /* 科目カラー */
        .bg-math { background: #ea4335; } .bg-english { background: #4285f4; } .bg-gengoku { background: #f06292; } 
        .bg-genbun { background: #ba68c8; } .bg-kasei { background: #34a853; } .bg-butsuchi { background: #81c784; }
        .bg-koukyo { background: #fbbc04; } .bg-chisou { background: #ff8f00; } .bg-info { background: #00acc1; } 
        .bg-health { background: #00897b; } .bg-art { background: #7986cb; } .bg-home { background: #a1887f; } .bg-other { background: #90a4ae; }

        #user-profile { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #f1f3f4; border-radius: 8px; margin-bottom: 15px; }
        #user-info { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: bold; }
        #user-info img { width: 24px; height: 24px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- ログインセクション -->
    <div id="auth-section">
        <button id="btn-login" class="btn-main btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
            Googleログイン (テスト接続)
        </button>
        <div id="user-profile" style="display:none;">
            <div id="user-info"></div>
            <button onclick="logout()" style="background:none; border:none; color:#d93025; font-size:11px; cursor:pointer; font-weight:bold;">ログアウト</button>
        </div>
    </div>

    <div class="team-tabs" id="teamTabs"></div>

    <div class="layout">
        <div class="sidebar">
            <h2><i class="fas fa-plus-circle"></i> 課題登録</h2>
            <input type="text" id="taskName" placeholder="タイトルを入力">
            <select id="taskSubject">
                <option value="math">数学</option><option value="english">英語</option><option value="gengoku">現国</option>
                <option value="genbun">言文</option><option value="kasei">化生</option><option value="butsuchi">物地</option>
                <option value="koukyo">公共</option><option value="chisou">地総</option><option value="info">情報</option>
                <option value="health">保健体育</option><option value="art">芸術</option><option value="home">家庭科</option><option value="other">その他</option>
            </select>
            <input type="date" id="taskDate">
            <button class="btn-main btn-add" onclick="addSingleTask()">クラウドに保存</button>
        </div>

        <div class="calendar-container">
            <div class="cal-header">
                <button onclick="changeMonth(-1)" style="border:none; background:none; padding:10px;"><i class="fas fa-chevron-left"></i></button>
                <h2 id="monthLabel" style="font-size: 16px; font-weight: 800;"></h2>
                <button onclick="changeMonth(1)" style="border:none; background:none; padding:10px;"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="cal-grid" id="grid"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ahovehkshnnlipcssilm.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_aoTV062URNq1LknmLrbfhg_yCioD_hE';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let viewDate = new Date();
    let tasks = [];
    let currentTeam = localStorage.getItem('kaisei_current_team') || 'A';

    async function init() {
        renderTabs();
        updateMonthLabel();
        
        // ログイン状態のチェック
        const { data: { session } } = await supabaseClient.auth.getSession();
        updateAuthUI(session);

        await fetchTasks();
        render();

        supabaseClient.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => fetchTasks()).subscribe();
    }

    // 🌟 修正版ログイン：原因切り分けのためスコープを削除
    async function login() {
        const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.href // 住所が合っているかのテスト
            }
        });
        if (error) alert(error.message);
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    function updateAuthUI(session) {
        if (session) {
            document.getElementById('btn-login').style.display = 'none';
            document.getElementById('user-profile').style.display = 'flex';
            document.getElementById('user-info').innerHTML = `
                <img src="${session.user.user_metadata.avatar_url}">
                <span>${session.user.user_metadata.full_name}</span>
            `;
        }
    }

    async function fetchTasks() {
        const { data } = await supabaseClient.from('tasks').select('*').eq('team', currentTeam);
        if (data) { tasks = data; render(); }
    }

    async function addSingleTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const sub = document.getElementById('taskSubject').value;
        if(!name || !date) return alert("入力エラー");
        await supabaseClient.from('tasks').insert([{ team: currentTeam, name, deadline: date, subject: sub }]);
        document.getElementById('taskName').value = '';
    }

    async function deleteTask(id) {
        if(confirm("削除しますか？")) await supabaseClient.from('tasks').delete().eq('id', id);
    }

    function renderTabs() {
        const container = document.getElementById('teamTabs');
        container.innerHTML = '';
        ['A','B','C','D','E','F'].forEach(t => {
            const btn = document.createElement('div');
            btn.className = `team-tab ${currentTeam === t ? 'active' : ''}`;
            btn.innerText = `TEAM ${t}`;
            btn.onclick = () => { currentTeam = t; localStorage.setItem('kaisei_current_team', t); renderTabs(); fetchTasks(); };
            container.appendChild(btn);
        });
    }

    function updateMonthLabel() { document.getElementById('monthLabel').innerText = `${viewDate.getFullYear()}年 ${viewDate.getMonth() + 1}月`; }
    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); updateMonthLabel(); render(); }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="cal-label">${d}</div>`);
        const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const last = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell" style="background:#fafafa; cursor:default;"></div>`;
        for(let d=1; d<=last; d++) {
            const dateStr = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toLocaleDateString('sv-SE') === dateStr;
            let html = `<div class="cal-cell ${isToday?'today':''}" onclick="document.getElementById('taskDate').value='${dateStr}'"><span class="day-num">${d}</span>`;
            tasks.filter(t => t.deadline === dateStr).forEach(t => {
                html += `<div class="task-bar bg-${t.subject}"><span>${t.name}</span><i class="fas fa-times" onclick="event.stopPropagation();deleteTask('${t.id}')"></i></div>`;
            });
            grid.innerHTML += html + `</div>`;
        }
    }
    init();
</script>
</body>
</html>
