<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaisei Task Manager - Ultimate Responsive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --border: #dadce0; --today-bg: #fff9c4; --selected-bg: #e8f0fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: sans-serif; background: #f8f9fa; color: #202124; padding: 10px; font-size: 14px; overflow-x: hidden; }

        .wrapper { max-width: 1200px; margin: 0 auto; }

        /* チームタブ */
        .team-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .team-tab { padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .team-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* レイアウト */
        .layout { display: flex; gap: 15px; align-items: flex-start; }
        @media (max-width: 850px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100% !important; position: static !important; }
            .cal-cell { min-height: 80px !important; }
        }

        .sidebar { width: 300px; background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 15px; margin-bottom: 15px; color: var(--primary); font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        label { font-size: 11px; font-weight: bold; color: #5f6368; margin-top: 10px; display: block; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; }
        
        .mode-switch { background: #f1f3f4; padding: 10px; border-radius: 10px; margin: 15px 0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 12px; font-weight: bold; }
        .mode-switch.active { background: var(--selected-bg); color: var(--primary); border: 1px solid var(--primary); }

        .btn-main { width: 100%; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-add { background: var(--primary); }
        .btn-confirm { background: #1e8e3e; }

        /* フィルター */
        .filter-section { border-top: 1px solid #eee; margin-top: 20px; padding-top: 15px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .filter-chip { padding: 6px; border-radius: 6px; border: 1px solid var(--border); font-size: 10px; text-align: center; cursor: pointer; background: #fff; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .filter-chip.active { background: var(--selected-bg); border-color: var(--primary); color: var(--primary); }

        /* カレンダー */
        .calendar-container { flex: 1; background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        .cal-label { padding: 10px; text-align: center; font-size: 11px; font-weight: bold; color: #70757a; background: #f8f9fa; border-bottom: 1px solid var(--border); }
        .cal-cell { min-height: 110px; border: 0.1px solid #f1f3f4; padding: 4px; position: relative; cursor: pointer; }
        .cal-cell.today { background: var(--today-bg) !important; }
        .cal-cell.selected { border: 2px solid var(--primary); background: var(--selected-bg); z-index: 2; }
        
        .day-num { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; }
        .task-bar { font-size: 9px; padding: 2px 4px; border-radius: 4px; margin-bottom: 1px; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: grab; }

        /* 科目カラー */
        .bg-math { background: #ea4335; } .bg-english { background: #4285f4; } .bg-gengoku { background: #f06292; } 
        .bg-genbun { background: #ba68c8; } .bg-kasei { background: #34a853; } .bg-butsuchi { background: #81c784; }
        .bg-koukyo { background: #fbbc04; } .bg-chisou { background: #ff8f00; } .bg-info { background: #00acc1; } 
        .bg-health { background: #00897b; } .bg-art { background: #7986cb; } .bg-home { background: #a1887f; } .bg-other { background: #90a4ae; }

        #sync-status { font-size: 10px; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="team-tabs" id="teamTabs"></div>

    <div class="layout">
        <div class="sidebar">
            <h2><i class="fas fa-plus-circle"></i> 課題登録</h2>
            <input type="text" id="taskName" placeholder="タイトル">
            <label>科目</label>
            <select id="taskSubject">
                <option value="math">数学</option><option value="english">英語</option><option value="gengoku">現国</option>
                <option value="genbun">言文</option><option value="kasei">化生</option><option value="butsuchi">物地</option>
                <option value="koukyo">公共</option><option value="chisou">地総</option><option value="info">情報</option>
                <option value="health">保健体育</option><option value="art">芸術</option><option value="home">家庭科</option><option value="other">その他</option>
            </select>

            <div class="mode-switch" id="modeSwitch" onclick="toggleMultiMode()">
                <span>複数日を選択する</span>
                <i class="fas fa-mouse-pointer"></i>
            </div>

            <div id="singleAction">
                <label>締切日</label>
                <input type="date" id="taskDate">
                <button class="btn-main btn-add" onclick="addSingleTask()">保存</button>
            </div>

            <div id="multiAction" style="display: none;">
                <p id="selectedCount" style="font-size:11px; text-align:center; color:var(--primary); font-weight:bold;">0日選択中</p>
                <button class="btn-main btn-confirm" id="confirmBtn" disabled onclick="addMultiTasks()">選択した日で確定</button>
            </div>

            <div id="sync-status">● クラウド接続待ち</div>

            <div class="filter-section">
                <h2><i class="fas fa-filter"></i> フィルター</h2>
                <div class="filter-grid" id="filterGrid">
                    <div class="filter-chip active" id="filter-all" style="grid-column: span 2;" onclick="setFilter('all')">すべて表示</div>
                </div>
            </div>
        </div>

        <div class="calendar-container">
            <div class="cal-header">
                <button onclick="changeMonth(-1)" style="border:none; background:none; padding:10px;"><i class="fas fa-chevron-left"></i></button>
                <h2 id="monthLabel"></h2>
                <button onclick="changeMonth(1)" style="border:none; background:none; padding:10px;"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="cal-grid" id="grid"></div>
        </div>
    </div>
</div>

<script>
    // 🌟 --- ここを自分のSupabase情報に書き換えてください --- 🌟
    const SUPABASE_URL = 'https://ahovehkshnnlipcssilm.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_aoTV062URNq1LknmLrbfhg_yCioD_hE';
    // 🌟 -------------------------------------------------- 🌟

    // グローバル変数の宣言を一番上に持ってくる
    let viewDate = new Date();
    let tasks = [];
    let isMultiMode = false;
    let selectedDates = new Set();
    let currentFilters = new Set(['all']);
    let currentTeam = localStorage.getItem('kaisei_current_team') || 'A';
    let supabaseClient = null;

    const subjects = [
        {id:'math', n:'数学'}, {id:'english', n:'英語'}, {id:'gengoku', n:'現国'},
        {id:'genbun', n:'言文'}, {id:'kasei', n:'化生'}, {id:'butsuchi', n:'物地'},
        {id:'koukyo', n:'公共'}, {id:'chisou', n:'地総'}, {id:'info', n:'情報'},
        {id:'health', n:'保体'}, {id:'art', n:'芸術'}, {id:'home', n:'家庭'}, {id:'other', n:'他'}
    ];

    if (SUPABASE_URL.startsWith('http')) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    async function init() {
        renderTabs();
        renderFilters();
        updateMonthLabel();
        render();

        if (supabaseClient) {
            await fetchTasks();
            document.getElementById('sync-status').innerText = "● オンライン同期中";
            document.getElementById('sync-status').style.color = "green";

            supabaseClient.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => fetchTasks()).subscribe();
        } else {
            document.getElementById('sync-status').innerText = "⚠️ APIキー未設定";
            document.getElementById('sync-status').style.color = "red";
        }
    }

    async function fetchTasks() {
        if (!supabaseClient) return;
        const { data } = await supabaseClient.from('tasks').select('*').eq('team', currentTeam);
        if (data) { tasks = data; render(); }
    }

    function renderTabs() {
        const container = document.getElementById('teamTabs');
        container.innerHTML = '';
        ['A','B','C','D','E','F'].forEach(t => {
            const btn = document.createElement('div');
            btn.className = `team-tab ${currentTeam === t ? 'active' : ''}`;
            btn.innerText = `TEAM ${t}`;
            btn.onclick = () => { currentTeam = t; localStorage.setItem('kaisei_current_team', t); renderTabs(); fetchTasks(); };
            container.appendChild(btn);
        });
    }

    function renderFilters() {
        const grid = document.getElementById('filterGrid');
        subjects.forEach(s => {
            const chip = document.createElement('div');
            chip.className = 'filter-chip';
            chip.dataset.sub = s.id;
            chip.innerText = s.n;
            chip.onclick = () => setFilter(s.id);
            grid.appendChild(chip);
        });
    }

    function setFilter(sub) {
        if (sub === 'all') { currentFilters.clear(); currentFilters.add('all'); }
        else {
            currentFilters.delete('all');
            if (currentFilters.has(sub)) { currentFilters.delete(sub); if(currentFilters.size===0) currentFilters.add('all'); }
            else currentFilters.add(sub);
        }
        document.querySelectorAll('.filter-chip').forEach(c => {
            const s = c.getAttribute('data-sub') || 'all';
            c.classList.toggle('active', currentFilters.has(s));
        });
        render();
    }

    function toggleMultiMode() {
        isMultiMode = !isMultiMode;
        selectedDates.clear();
        document.getElementById('modeSwitch').classList.toggle('active', isMultiMode);
        document.getElementById('singleAction').style.display = isMultiMode ? "none" : "block";
        document.getElementById('multiAction').style.display = isMultiMode ? "block" : "none";
        render();
    }

    function handleDateClick(dateStr) {
        if (!isMultiMode) document.getElementById('taskDate').value = dateStr;
        else {
            if (selectedDates.has(dateStr)) selectedDates.delete(dateStr);
            else selectedDates.add(dateStr);
            document.getElementById('selectedCount').innerText = `${selectedDates.size} 日選択中`;
            document.getElementById('confirmBtn').disabled = selectedDates.size === 0;
        }
        render();
    }

    async function addSingleTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const sub = document.getElementById('taskSubject').value;
        if(!name || !date || !supabaseClient) return alert("情報を確認してください");
        await supabaseClient.from('tasks').insert([{ team: currentTeam, name, deadline: date, subject: sub }]);
        document.getElementById('taskName').value = '';
    }

    async function addMultiTasks() {
        const name = document.getElementById('taskName').value;
        const sub = document.getElementById('taskSubject').value;
        const newTasks = Array.from(selectedDates).map(d => ({ team: currentTeam, name, deadline: d, subject: sub }));
        await supabaseClient.from('tasks').insert(newTasks);
        toggleMultiMode();
    }

    async function deleteTask(id) {
        if(confirm("削除しますか？")) await supabaseClient.from('tasks').delete().eq('id', id);
    }

    function onDragStart(ev, id) { ev.dataTransfer.setData("taskId", id); }
    function onDragOver(ev) { ev.preventDefault(); }
    async function onDrop(ev, newDate) {
        ev.preventDefault();
        const id = ev.dataTransfer.getData("taskId");
        if(supabaseClient) await supabaseClient.from('tasks').update({ deadline: newDate }).eq('id', id);
    }

    function updateMonthLabel() {
        document.getElementById('monthLabel').innerText = `${viewDate.getFullYear()}年 ${viewDate.getMonth() + 1}月`;
    }

    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); updateMonthLabel(); render(); }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="cal-label">${d}</div>`);
        const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const last = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell" style="background:#fafafa"></div>`;
        for(let d=1; d<=last; d++) {
            const dateStr = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toLocaleDateString('sv-SE') === dateStr;
            const isSelected = selectedDates.has(dateStr);
            let html = `<div class="cal-cell ${isToday?'today':''} ${isSelected?'selected':''}" 
                        onclick="handleDateClick('${dateStr}')" ondragover="onDragOver(event)" ondrop="onDrop(event, '${dateStr}')">
                        <span class="day-num">${d}</span>`;
            tasks.filter(t => t.deadline === dateStr && (currentFilters.has('all') || currentFilters.has(t.subject))).forEach(t => {
                html += `<div class="task-bar bg-${t.subject}" draggable="true" ondragstart="onDragStart(event, '${t.id}')" onclick="event.stopPropagation()">
                         <span>${t.name}</span><i class="fas fa-times" onclick="deleteTask('${t.id}')"></i></div>`;
            });
            grid.innerHTML += html + `</div>`;
        }
    }
    init();
</script>
</body>
</html>
