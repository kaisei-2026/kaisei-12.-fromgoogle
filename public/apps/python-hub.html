<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Elite Python Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --accent: #3b82f6; --text: #cccccc; --cell-bg: #2d2d2d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; background: var(--bg); color: #fff; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header & Tabs */
        header { height: 45px; background: #333; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #000; }
        .mode-tabs { display: flex; gap: 5px; height: 100%; align-items: flex-end; }
        .mode-tab { padding: 8px 20px; background: #2d2d2d; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 5px 5px 0 0; color: #888; transition: 0.2s; }
        .mode-tab.active { background: var(--bg); color: #fff; border-top: 2px solid var(--accent); }
        
        .status { font-size: 10px; padding: 4px 12px; border-radius: 20px; background: #444; }
        .status.ready { background: #065f46; color: #fff; }

        #main { flex: 1; overflow: hidden; display: flex; }

        /* IDE Mode */
        #ide-container { flex: 1; display: flex; flex-direction: column; }
        #ace-editor { flex: 1; font-size: 15px; }
        #terminal { height: 200px; background: #000; border-top: 2px solid #333; overflow-y: auto; padding: 15px; font-family: monospace; font-size: 13px; }

        /* Notebook Mode */
        #notebook-container { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; gap: 20px; background: #1e1e1e; }
        .cell { background: var(--cell-bg); border-radius: 8px; border: 1px solid #444; overflow: hidden; }
        .cell-input { position: relative; border-left: 4px solid #555; }
        .cell-input.running { border-left-color: var(--accent); }
        .cell-editor { height: 100px; font-size: 14px; }
        .cell-output { padding: 10px 15px; background: #1a1a1a; font-family: monospace; font-size: 12px; color: #aaa; min-height: 30px; white-space: pre-wrap; border-top: 1px solid #333; }
        .run-cell-btn { position: absolute; left: -35px; top: 5px; background: none; border: none; color: #666; cursor: pointer; font-size: 18px; }
        .run-cell-btn:hover { color: var(--accent); }
        .add-cell-btn { padding: 10px; border: 2px dashed #444; border-radius: 8px; text-align: center; cursor: pointer; color: #666; transition: 0.2s; }
        .add-cell-btn:hover { border-color: var(--accent); color: var(--accent); }

        .hidden { display: none !important; }
        .err { color: #f87171; }
    </style>
</head>
<body>

<header>
    <div class="mode-tabs">
        <div id="tab-ide" class="mode-tab active" onclick="switchMode('ide')"><i class="fas fa-code"></i> IDE MODE</div>
        <div id="tab-nb" class="mode-tab" onclick="switchMode('nb')"><i class="fas fa-book"></i> JUPYTER MODE</div>
    </div>
    <div id="py-status" class="status">Initializing Python...</div>
</header>

<div id="main">
    <!-- IDE Mode -->
    <div id="ide-container">
        <div style="padding: 10px; background: #252526; display: flex; justify-content: flex-end;">
            <button onclick="runIDE()" style="background:var(--accent); color:white; border:none; padding:5px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">▶ RUN SCRIPT</button>
        </div>
        <div id="ace-editor"># IDE Mode (Run all at once)
print("Hello from IDE Mode")
x = 10
print(f"x is {x}")</div>
        <div id="terminal"></div>
    </div>

    <!-- Notebook Mode -->
    <div id="notebook-container">
        <div id="cells-wrapper">
            <!-- セルがここに追加される -->
        </div>
        <div class="add-cell-btn" onclick="addCell()">+ Click to add a new cell</div>
    </div>
</div>

<script>
    let pyodide;
    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");
    editor.getSession().setMode("ace/mode/python");

    async function initPy() {
        pyodide = await loadPyodide();
        document.getElementById('py-status').innerText = "Python 3.11 Ready";
        document.getElementById('py-status').classList.add('ready');
        addCell("print('Jupyter Mode Ready')\ny = 20");
    }

    function switchMode(mode) {
        const ide = document.getElementById('ide-container');
        const nb = document.getElementById('notebook-container');
        const tIde = document.getElementById('tab-ide');
        const tNb = document.getElementById('tab-nb');

        if(mode === 'ide') {
            ide.style.display = 'flex'; nb.style.display = 'none';
            tIde.classList.add('active'); tNb.classList.remove('active');
        } else {
            ide.style.display = 'none'; nb.style.display = 'flex';
            tIde.classList.remove('active'); tNb.classList.add('active');
        }
    }

    // IDE実行
    async function runIDE() {
        const term = document.getElementById('terminal');
        term.innerHTML = "Running...\n";
        pyodide.setStdout({ batched: (s) => term.innerText += s + "\n" });
        try {
            await pyodide.runPythonAsync(editor.getValue());
        } catch (e) { term.innerHTML += `<div class="err">${e}</div>`; }
    }

    // Jupyterセル追加
    function addCell(initialCode = "") {
        const id = 'cell-' + Date.now();
        const wrapper = document.getElementById('cells-wrapper');
        const cellDiv = document.createElement('div');
        cellDiv.className = 'cell';
        cellDiv.id = id;
        cellDiv.innerHTML = `
            <div class="cell-input">
                <button class="run-cell-btn" onclick="runCell('${id}')"><i class="fas fa-play-circle"></i></button>
                <div class="cell-editor" id="${id}-ed"></div>
            </div>
            <div class="cell-output" id="${id}-out">Out: </div>
        `;
        wrapper.appendChild(cellDiv);

        const cellEd = ace.edit(`${id}-ed`);
        cellEd.setTheme("ace/theme/monokai");
        cellEd.getSession().setMode("ace/mode/python");
        cellEd.setValue(initialCode, -1);
        cellEd.setOptions({ maxLines: 15, minLines: 3, showPrintMargin: false });
    }

    // Jupyterセル実行
    async function runCell(cellId) {
        const cellEd = ace.edit(`${cellId}-ed`);
        const out = document.getElementById(`${cellId}-out`);
        const inputArea = document.querySelector(`#${cellId} .cell-input`);
        
        out.innerText = "Running...";
        inputArea.classList.add('running');

        pyodide.setStdout({ batched: (s) => out.innerText = "Out: \n" + s });
        
        try {
            await pyodide.runPythonAsync(cellEd.getValue());
            inputArea.classList.remove('running');
        } catch (e) {
            out.innerHTML = `<div class="err">${e}</div>`;
            inputArea.classList.remove('running');
        }
    }

    initPy();
</script>
</body>
</html>
