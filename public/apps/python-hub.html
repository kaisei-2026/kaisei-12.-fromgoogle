<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Elite Python Hub Pro v5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #1e1e1e; --accent: #3b82f6; --stop: #ef4444; --text: #f3f4f6; --cell-bg: #2d2d2d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; }
        
        header { height: 50px; background: #333; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #000; }
        .mode-tabs { display: flex; gap: 5px; height: 100%; align-items: flex-end; }
        .mode-tab { padding: 10px 20px; background: #2d2d2d; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 6px 6px 0 0; color: #888; transition: 0.2s; border: 1px solid transparent; border-bottom: none; }
        .mode-tab.active { background: var(--bg); color: #fff; border-color: #444; border-top: 3px solid var(--accent); }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .status { font-size: 11px; font-weight: bold; padding: 5px 12px; border-radius: 20px; background: #444; color: #aaa; }
        .status.ready { background: #065f46; color: #fff; }
        .btn-stop { background: var(--stop); color: white; border: none; padding: 6px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }

        #main { flex: 1; overflow: hidden; display: flex; }
        #ide-container { flex: 1; display: flex; flex-direction: column; }
        #ace-editor { flex: 1; font-size: 16px; font-weight: 700; }
        #terminal { height: 250px; background: #000; border-top: 2px solid #333; overflow-y: auto; padding: 15px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; color: #0f0; white-space: pre-wrap; line-height: 1.4; }

        #notebook-container { flex: 1; overflow-y: auto; padding: 30px; display: none; flex-direction: column; gap: 25px; background: #1e1e1e; }
        .cell { background: var(--cell-bg); border-radius: 10px; border: 1px solid #444; }
        .cell-input-header { padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; background: #333; border-radius: 9px 9px 0 0; }
        .cell-output { padding: 15px; background: #161616; font-family: monospace; font-size: 13px; color: #ddd; min-height: 40px; white-space: pre-wrap; border-radius: 0 0 9px 9px; }
        
        .run-btn { background: var(--accent); color: white; border: none; padding: 6px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .err { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="mode-tabs">
        <div id="tab-ide" class="mode-tab active" onclick="switchMode('ide')">📄 IDE モード</div>
        <div id="tab-nb" class="mode-tab" onclick="switchMode('nb')">📓 Jupyter モード</div>
    </div>
    <div class="header-actions">
        <div id="py-status" class="status">Python 準備中...</div>
        <!-- 停止ボタン：リロードせずに無限ループを抜ける試み -->
        <button id="stop-btn" class="btn-stop" onclick="interruptPython()">
            <i class="fas fa-hand-paper"></i> 実行を停止
        </button>
    </div>
</header>

<div id="main">
    <div id="ide-container">
        <div style="padding: 10px; background: #252526; display: flex; justify-content: flex-end;">
            <button class="run-btn" onclick="runIDE()">▶ コードを実行 (RUN)</button>
        </div>
        <div id="ace-editor"># ここにコードを貼り付けてください</div>
        <div id="terminal"></div>
    </div>

    <div id="notebook-container">
        <div id="cells-wrapper"></div>
        <div style="text-align:center; padding: 20px; color:#666">Notebookモードは現在実験中です。IDEモードをご利用ください。</div>
    </div>
</div>

<script>
    let pyodide;
    const editor = ace.edit("ace-editor");
    editor.setTheme("ace/theme/monokai");
    editor.getSession().setMode("ace/mode/python");

    async function initPy() {
        try {
            pyodide = await loadPyodide();
            document.getElementById('py-status').innerText = "Python 3.11 Ready";
            document.getElementById('py-status').classList.add('ready');

            // --- 🌟 魔法の「エラー回避」設定 🌟 ---
            await pyodide.runPythonAsync(`
                import sys
                import builtins
                import types

                # 1. IPython.display.clear_output の偽物を作る
                ipython = types.ModuleType("IPython")
                display = types.ModuleType("display")
                ipython.display = display
                
                def clear_output(wait=False):
                    # JavaScriptの関数を呼び出してコンソールを消す
                    import js
                    js.clearTerminal()
                
                display.clear_output = clear_output
                sys.modules["IPython"] = ipython
                sys.modules["IPython.display"] = display

                # 2. input() をブラウザのポップアップ(prompt)に繋ぎ変える
                def custom_input(prompt_text=""):
                    import js
                    return js.window.prompt(prompt_text)
                
                builtins.input = custom_input
            `);
        } catch (e) {
            alert("起動失敗: " + e.message);
        }
    }

    // JSからターミナルを消去する関数
    window.clearTerminal = () => {
        document.getElementById('terminal').innerText = '';
    };

    // 停止機能
    function interruptPython() {
        alert("ループ停止を試みます。\n※完全に固まっている場合はリロードしてください。");
        // Pyodideの実行を強制終了する唯一の方法に近い処理
        if(pyodide) {
            pyodide.runPython("raise KeyboardInterrupt('User Interrupted')");
        }
    }

    async function runIDE() {
        const term = document.getElementById('terminal');
        term.innerText = "実行中...\n";
        
        // 標準出力をターミナルに表示
        pyodide.setStdout({ batched: (s) => {
            term.innerText += s + "\n";
            term.scrollTop = term.scrollHeight;
        }});

        try {
            await pyodide.runPythonAsync(editor.getValue());
            term.innerText += "\n--- 実行終了 ---";
        } catch (e) {
            if (e.message.includes("User Interrupted")) {
                term.innerHTML += `<div class="err">実行がユーザーによって停止されました。</div>`;
            } else {
                term.innerHTML += `<div class="err">Error: ${e.message}</div>`;
            }
        }
    }

    function switchMode(mode) {
        const ide = document.getElementById('ide-container');
        const nb = document.getElementById('notebook-container');
        document.getElementById('tab-ide').classList.toggle('active', mode==='ide');
        document.getElementById('tab-nb').classList.toggle('active', mode==='nb');
        ide.style.display = (mode==='ide') ? 'flex' : 'none';
        nb.style.display = (mode==='nb') ? 'flex' : 'none';
    }

    initPy();
</script>
</body>
</html>
